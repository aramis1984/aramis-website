<style id="nav-css-reference">

/* ─── NAV ────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--nav-h);
  display: flex; align-items: center;
  padding: 0 40px;
  background: transparent;
  transition: background .4s, border-color .4s;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(26,24,20,.97);
  border-bottom-color: rgba(200,169,110,.12);
  backdrop-filter: blur(12px);
}

/* Left / Logo / Right columns */
.nav-left {
  display: flex; align-items: center; justify-content: flex-end;
  flex: 1; gap: 2px;
}
.nav-right {
  display: flex; align-items: center; justify-content: flex-start;
  flex: 1; gap: 2px;
}
.nav-logo { padding: 0 28px; flex-shrink: 0; }
.nav-logo img { width: 340px; height: 104px; object-fit: contain; display: block; }

/* Base nav link */
.nav-lk {
  font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px;
  text-transform: uppercase; color: rgba(243,229,210,.65);
  padding: 10px 22px; transition: color .2s;
  white-space: nowrap; line-height: 1; cursor: pointer;
  position: relative;
}
.nav-lk:hover,
.nav-lk.active { color: var(--gold); }

/* ── Dropdown parent ── */
.nav-dd {
  position: relative;
  display: flex; align-items: center;
}

/* "The Venue" trigger */
.nav-dd-trigger {
  display: flex; align-items: center; gap: 5px;
}
.nav-dd-trigger .chevron {
  width: 10px; height: 10px;
  transition: transform .25s;
  opacity: .5; flex-shrink: 0;
}
.nav-dd:hover .chevron,
.nav-dd.open  .chevron { transform: rotate(180deg); opacity: 1; }

/* Dropdown panel */
.nav-dd-panel {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 220px;
  background: rgba(22,20,17,.98);
  border: 1px solid rgba(200,169,110,.15);
  border-top: 2px solid var(--gold);
  backdrop-filter: blur(16px);
  padding: 8px 0;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  /* Open fast, close with delay so cursor can travel to panel */
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear .35s;
  pointer-events: none;
}
/* Invisible bridge between trigger and panel — prevents accidental close */
.nav-dd-panel::before {
  content: '';
  position: absolute;
  bottom: 100%; left: 0; right: 0;
  height: 12px;
}
.nav-dd:hover .nav-dd-panel,
.nav-dd.open  .nav-dd-panel {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear 0s;
  pointer-events: auto;
}

/* Dropdown items */
.nav-dd-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  font-size: 10px; font-weight: 500; letter-spacing: 1.8px;
  text-transform: uppercase; color: rgba(243,229,210,.6);
  transition: color .18s, background .18s;
  white-space: nowrap;
}
.nav-dd-item:hover { color: var(--gold); background: rgba(200,169,110,.05); }
.nav-dd-item .dd-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--gold); opacity: .4; flex-shrink: 0;
}
.nav-dd-divider {
  height: 1px; background: rgba(200,169,110,.08);
  margin: 6px 0;
}

/* ── Mobile — hide left/right, keep logo centred ── */
@media (max-width: 960px) {
  .nav-left, .nav-right { display: none; }
  .nav-logo { padding: 0; }
  .nav-logo img { width: 240px; height: auto; }
  .nav { justify-content: center; }
}

</style>

<!-- ════════════════════════════════════════════════════════════════════
     JS — paste inside <script> on every page
     The fade-up and zoom observers are page-specific — only this
     nav block is required on all pages.
     ════════════════════════════════════════════════════════════════════ -->
<script id="nav-js-reference">

// ── Nav: solid background on scroll
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

// ── Venue dropdown: touch/mobile click support
const venueDd = document.getElementById('nav-venue');
if (venueDd) {
  venueDd.addEventListener('click', e => {
    // On touch devices (no hover), toggle open class manually
    if (window.matchMedia('(hover: none)').matches) {
      e.preventDefault();
      venueDd.classList.toggle('open');
    }
  });
  // Close if clicking anywhere outside
  document.addEventListener('click', e => {
    if (!venueDd.contains(e.target)) venueDd.classList.remove('open');
  });
}

// ── Fade-up on scroll (include on every page)
const fuObs = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
}, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.fu').forEach(el => fuObs.observe(el));

</script>
