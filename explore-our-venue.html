<style>

/* ─── TOKENS ─────────────────────────────── */
:root {
  --bg:       #1a1814;
  --bg-card:  #232019;
  --bg-surf:  #2a2620;
  --gold:     #c8a96e;
  --gold-h:   #dcc48e;
  --cream:    #f3e5d2;
  --muted:    #c8b9a4;
  --nav-h:    180px;
  --gutter:   72px;
  --max-w:    1200px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

/* ─── NAV ────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--nav-h);
  display: flex; align-items: center;
  padding: 0 40px;
  background: rgba(26,24,20,.85);
  transition: background .4s, border-color .4s;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(26,24,20,.97);
  border-bottom-color: rgba(200,169,110,.12);
  backdrop-filter: blur(12px);
}
.nav-left {
  display: flex; align-items: center; justify-content: flex-end;
  flex: 1; gap: 2px;
}
.nav-right {
  display: flex; align-items: center; justify-content: flex-start;
  flex: 1; gap: 2px;
}
.nav-logo { padding: 0 28px; flex-shrink: 0; }
.nav-logo img { width: 340px; height: 104px; object-fit: contain; display: block; }
.nav-lk {
  font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px;
  text-transform: uppercase; color: rgba(243,229,210,.65);
  padding: 10px 22px; transition: color .2s;
  white-space: nowrap; line-height: 1; cursor: pointer; position: relative;
}
.nav-lk:hover, .nav-lk.active { color: var(--gold); }
.nav-dd { position: relative; display: flex; align-items: center; }
.nav-dd-trigger { display: flex; align-items: center; gap: 5px; }
.nav-dd-trigger .chevron {
  width: 10px; height: 10px; transition: transform .25s; opacity: .5; flex-shrink: 0;
}
.nav-dd:hover .chevron, .nav-dd.open .chevron { transform: rotate(180deg); opacity: 1; }
.nav-dd-panel {
  position: absolute; top: calc(100% + 8px); left: 0; min-width: 220px;
  background: rgba(22,20,17,.98);
  border: 1px solid rgba(200,169,110,.15); border-top: 2px solid var(--gold);
  backdrop-filter: blur(16px); padding: 8px 0;
  opacity: 0; visibility: hidden; transform: translateY(-4px);
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear .35s;
  pointer-events: none;
}
.nav-dd-panel::before {
  content: ''; position: absolute; bottom: 100%; left: 0; right: 0; height: 12px;
}
.nav-dd:hover .nav-dd-panel, .nav-dd.open .nav-dd-panel {
  opacity: 1; visibility: visible; transform: translateY(0);
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear 0s;
  pointer-events: auto;
}
.nav-dd-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  font-size: 10px; font-weight: 500; letter-spacing: 1.8px;
  text-transform: uppercase; color: rgba(243,229,210,.6);
  transition: color .18s, background .18s; white-space: nowrap;
}
.nav-dd-item:hover { color: var(--gold); background: rgba(200,169,110,.05); }
.nav-dd-item .dd-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--gold); opacity: .4; flex-shrink: 0;
}
.nav-dd-divider { height: 1px; background: rgba(200,169,110,.08); margin: 6px 0; }

  .nav { justify-content: center; }
  .nav-logo img { width: 240px; height: auto; }
}

/* ─── HERO ───────────────────────────────── */
.hero {
  position: relative;
  height: 100vh; min-height: 680px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* Placeholder — visible when no image/video */
.hero-placeholder {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 40%, rgba(200,169,110,.06) 0%, transparent 65%),
    linear-gradient(160deg, #1e1b16 0%, #141210 60%, #1a1814 100%);
}
.hero-placeholder-grid {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 59px, rgba(200,169,110,.02) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(200,169,110,.02) 60px);
}
.hero-placeholder-badge {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.hero-placeholder-badge-inner {
  border: 1px dashed rgba(200,169,110,.15);
  padding: 28px 44px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.hero-placeholder-badge-inner svg { color: rgba(200,169,110,.2); }
.hero-placeholder-badge-inner span {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(200,169,110,.25);
}

/* Live media — uncomment the element and add .has-media to .hero */
.hero-media {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center 40%;
  display: none;
}
.hero.has-media .hero-media     { display: block; }
.hero.has-media .hero-placeholder { display: none; }

.hero-ov {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(26,24,20,.5)  0%,
    rgba(26,24,20,.08) 30%,
    rgba(26,24,20,.08) 55%,
    rgba(26,24,20,.9)  100%
  );
}
.hero-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 0 var(--gutter);
  max-width: 800px;
}
.hero-eyebrow {
  font-size: 9px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 28px;
  display: flex; align-items: center; gap: 16px;
}
.hero-eyebrow::before,
.hero-eyebrow::after { content: ''; width: 28px; height: 1px; background: var(--gold); opacity: .5; }
.hero-hed {
  font-family: 'Fraunces', serif;
  font-size: clamp(44px, 7vw, 96px);
  font-weight: 400; font-style: italic;
  line-height: 1.07; color: var(--cream);
  margin-bottom: 28px; letter-spacing: -1px;
}
.hero-rule {
  width: 1px; height: 52px;
  background: linear-gradient(to bottom, rgba(200,169,110,.45), transparent);
  margin: 0 auto 22px;
}
.hero-sub {
  font-size: 12px; font-weight: 400; letter-spacing: 2px;
  color: rgba(200,185,164,.45); line-height: 1.8;
}
.hero-scroll {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 2;
}
.hero-scroll span {
  font-size: 8px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(200,185,164,.35);
}
.scroll-line {
  width: 1px; height: 44px;
  background: linear-gradient(to bottom, rgba(200,169,110,.4), transparent);
}

/* ─── INTRO STRIP ────────────────────────── */
.intro-strip {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
  padding: 64px var(--gutter);
  text-align: center;
}
.intro-strip-inner { max-width: 720px; margin: 0 auto; }
.stag {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 14px;
  justify-content: center; margin-bottom: 24px;
}
.stag::before { content: ''; width: 28px; height: 1px; background: var(--gold); }
.intro-strip p {
  font-size: 16px; line-height: 1.85; color: var(--muted);
}

/* ─── CARDS ──────────────────────────────── */
.cards-section {
  padding: 80px var(--gutter) 120px;
  max-width: var(--max-w);
  margin: 0 auto;
}
.cards-label {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(200,169,110,.35); margin-bottom: 52px;
  display: flex; align-items: center; gap: 14px;
}
.cards-label::before { content: ''; width: 28px; height: 1px; background: rgba(200,169,110,.25); }

.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}

.venue-card {
  position: relative; overflow: hidden;
  aspect-ratio: 4 / 3;
  background: var(--bg-surf);
  cursor: pointer; display: block;
}
/* Ghost number watermark */
.venue-card::before {
  content: attr(data-num);
  position: absolute; top: -16px; right: 20px; z-index: 1;
  font-family: 'Fraunces', serif; font-size: 148px; font-weight: 300;
  color: rgba(200,169,110,.04); line-height: 1; pointer-events: none;
  transition: color .5s ease;
  user-select: none;
}
.venue-card:hover::before { color: rgba(200,169,110,.09); }

/* Photo */
.card-photo {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .75s cubic-bezier(.25,.46,.45,.94), filter .5s;
  filter: saturate(.75) brightness(.65);
}
.venue-card:hover .card-photo {
  transform: scale(1.07);
  filter: saturate(.95) brightness(.72);
}

/* Placeholder (no photo yet) */
.card-photo-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: linear-gradient(135deg, var(--bg-surf) 0%, #1f1c18 100%);
  transition: background .4s;
}
.venue-card:hover .card-photo-placeholder {
  background: linear-gradient(135deg, #2a2620 0%, #232019 100%);
}
.card-photo-placeholder svg { color: rgba(200,169,110,.1); transition: color .4s; }
.venue-card:hover .card-photo-placeholder svg { color: rgba(200,169,110,.18); }
.card-photo-placeholder span {
  font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(200,169,110,.18);
}

/* Gradient overlay */
.card-ov {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(
    to bottom,
    transparent        0%,
    transparent        30%,
    rgba(26,24,20,.5)  62%,
    rgba(26,24,20,.93) 100%
  );
  transition: background .4s;
}
.venue-card:hover .card-ov {
  background: linear-gradient(
    to bottom,
    transparent        0%,
    transparent        18%,
    rgba(26,24,20,.45) 58%,
    rgba(26,24,20,.96) 100%
  );
}

/* Text body */
.card-body {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  padding: 36px 40px 44px;
}
.card-tag {
  font-size: 8px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px; opacity: .75;
  transition: opacity .3s;
}
.venue-card:hover .card-tag { opacity: 1; }
.card-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(26px, 2.6vw, 38px);
  font-weight: 400; line-height: 1.12; color: var(--cream);
  margin-bottom: 14px;
}
.card-desc {
  font-size: 13px; line-height: 1.72; color: rgba(200,185,164,.7);
  max-width: 380px;
  max-height: 0; overflow: hidden;
  opacity: 0;
  transition: max-height .45s ease, opacity .4s ease;
}
.venue-card:hover .card-desc { max-height: 100px; opacity: 1; }

.card-cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 20px;
  font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold);
  opacity: 0; transform: translateY(8px);
  transition: opacity .35s ease .08s, transform .35s ease .08s;
}
.venue-card:hover .card-cta { opacity: 1; transform: translateY(0); }
.card-cta svg { transition: transform .25s; }
.venue-card:hover .card-cta svg { transform: translateX(5px); }

/* ─── FOOTER ──────────────────────────────── */

/* ─── FADE-UP ─────────────────────────────── */
.fu { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }
.fu.vis { opacity: 1; transform: none; }
.fu-d1 { transition-delay: .12s; }
.fu-d2 { transition-delay: .22s; }
.fu-d3 { transition-delay: .32s; }

/* ─── RESPONSIVE ──────────────────────────── */
@media (max-width: 900px) {
  :root { --gutter: 36px; }
  .cards-grid { grid-template-columns: 1fr; }
  .venue-card { aspect-ratio: 3 / 2; }
  .card-desc  { max-height: 120px; opacity: 1; }
  .card-cta   { opacity: 1; transform: none; }
    }


/* ─── ARAMIS CULTURE ─────────────────────── */
.culture-section {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
}
.culture-inner {
  max-width: var(--max-w); margin: 0 auto;
  padding: 100px var(--gutter);
  display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: start;
}
.culture-intro {}
.culture-rules { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
.culture-rule {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 22px 24px; background: var(--bg-surf);
  border-left: 2px solid transparent;
  transition: border-color .3s;
}
.culture-rule:hover { border-left-color: var(--gold); }
.culture-rule-icon { color: var(--gold); flex-shrink: 0; margin-top: 1px; }
.culture-rule-title { font-size: 13px; font-weight: 500; color: var(--cream); margin-bottom: 4px; }
.culture-rule-desc { font-size: 12px; line-height: 1.65; color: rgba(200,185,164,.55); }
/* Priority rule — slightly highlighted */
.culture-rule.priority { border-left-color: rgba(200,169,110,.2); background: rgba(200,169,110,.04); }
.culture-rule.priority:hover { border-left-color: var(--gold); }
/* Venue teaser — compact version */
.culture-teaser {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
  padding: 64px var(--gutter);
  text-align: center;
}
.culture-teaser-inner { max-width: 680px; margin: 0 auto; }
.culture-teaser-stag {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 14px;
  justify-content: center; margin-bottom: 20px;
}
.culture-teaser-stag::before, .culture-teaser-stag::after { content: ''; width: 28px; height: 1px; background: var(--gold); opacity: .5; }
.culture-teaser-hed {
  font-family: 'Fraunces', serif; font-size: clamp(22px, 2.8vw, 36px);
  font-weight: 400; font-style: italic; color: var(--cream);
  line-height: 1.2; margin-bottom: 20px;
}
.culture-teaser-body { font-size: 14px; line-height: 1.8; color: var(--muted); margin-bottom: 28px; }
.culture-teaser-pillars {
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
}
.culture-pillar {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 6px 14px; border: 1px solid rgba(200,169,110,.18);
  color: rgba(200,169,110,.6);
}
/* Darts compact reference */
.culture-ref {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
  padding: 48px var(--gutter);
  display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
}
.culture-ref-icon { color: rgba(200,169,110,.3); flex-shrink: 0; }
.culture-ref-text {}
.culture-ref-title {
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}
.culture-ref-body { font-size: 14px; line-height: 1.75; color: var(--muted); }
.culture-ref-body a { color: var(--gold); border-bottom: 1px solid rgba(200,169,110,.25); transition: border-color .2s; }
.culture-ref-body a:hover { border-color: var(--gold); }

@media (max-width: 960px) {
  .culture-inner { grid-template-columns: 1fr; gap: 48px; }
}

  .nav-logo img { width: 200px; height: auto; }
  .strip { grid-template-columns: repeat(2, 1fr) !important; }
  .cards-row { grid-template-columns: 1fr 1fr !important; }
  .reviews-grid { grid-template-columns: 1fr 1fr !important; }
  .upcoming-grid { grid-template-columns: 1fr 1fr !important; }
  .gallery-grid { grid-template-columns: 1fr 1fr !important; }
}


/* ─── Hamburger button ───────────────────── */
.nav-hamburger {
  display: none;
  flex-direction: column; justify-content: center; gap: 5px;
  width: 48px; height: 48px; padding: 12px;
  cursor: pointer; background: none; border: none;
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  z-index: 1001; -webkit-tap-highlight-color: transparent;
}
.nav-hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: rgba(243,229,210,.8);
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  transform-origin: center;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ─── Overlay ────────────────────────────── */
.nav-overlay {
  position: fixed; inset: 0; z-index: 998;
  background: #141210;
  display: flex; flex-direction: column;
  clip-path: inset(0 0 100% 0);
  transition: clip-path .5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-overlay.open {
  clip-path: inset(0 0 0% 0);
  pointer-events: all;
}

/* Overlay header */
.ov-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.ov-logo { height: 52px; width: auto; object-fit: contain; }
.ov-close {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: rgba(200,185,164,.5);
  -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-close:hover { color: var(--cream); }

/* Gold rule */
.ov-rule {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,169,110,.25), transparent);
  margin: 0 24px;
  flex-shrink: 0;
}

/* Nav links */
.ov-nav {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 12px 36px 24px;
}
.ov-link {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0;
  border-bottom: 1px solid rgba(200,169,110,.07);
  transition: color .2s, transform .25s;
  -webkit-tap-highlight-color: transparent;
}
.ov-link:last-child { border-bottom: none; }
.ov-link:hover, .ov-link:active { color: var(--cream); transform: translateX(10px); }

/* Sub-group */
.ov-subgroup { border-bottom: 1px solid rgba(200,169,110,.07); }
.ov-subgroup:last-child { border-bottom: none; }
.ov-trigger {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0 12px;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-trigger:hover, .ov-trigger:active { color: var(--cream); }
.ov-trigger-arrow {
  width: 16px; height: 16px; color: rgba(200,169,110,.35);
  transition: transform .3s, color .2s; flex-shrink: 0; margin-top: 4px;
}
.ov-subgroup.expanded .ov-trigger-arrow { transform: rotate(90deg); color: var(--gold); }
.ov-subgroup.expanded .ov-trigger { color: var(--cream); }

.ov-sublinks {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
  padding-left: 4px;
}
.ov-subgroup.expanded .ov-sublinks { max-height: 300px; }
.ov-sublink {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,185,164,.4);
  padding: 10px 0;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.ov-sublink:hover, .ov-sublink:active { color: var(--gold); }
.ov-sublink .ov-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .3; flex-shrink: 0; }

/* Stagger animation */
.ov-link, .ov-trigger {
  opacity: 0; transform: translateY(16px);
  transition: opacity .4s ease, transform .4s ease, color .2s;
}
.nav-overlay.open .ov-link,
.nav-overlay.open .ov-trigger { opacity: 1; transform: translateY(0); }
.nav-overlay.open .ov-nav > *:nth-child(1) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(1).ov-link { transition-delay: .12s; }
.nav-overlay.open .ov-nav > *:nth-child(2) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(2).ov-link { transition-delay: .19s; }
.nav-overlay.open .ov-nav > *:nth-child(3) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(3).ov-link { transition-delay: .26s; }
.nav-overlay.open .ov-nav > *:nth-child(4) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(4).ov-link { transition-delay: .33s; }
.nav-overlay.open .ov-nav > *:nth-child(5) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(5).ov-link { transition-delay: .40s; }
.nav-overlay.open .ov-nav > *:nth-child(6).ov-link { transition-delay: .47s; }

/* Overlay footer */
.ov-footer {
  padding: 20px 36px 40px;
  border-top: 1px solid rgba(200,169,110,.08);
  flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
}
.ov-footer-hours { font-size: 11px; color: rgba(200,185,164,.3); margin-bottom: 3px; }
.ov-footer-addr  { font-size: 11px; color: rgba(200,185,164,.2); }
.ov-footer-ig { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(200,169,110,.4); transition: color .2s; }
.ov-footer-ig:hover { color: var(--gold); }

/* ── CANONICAL FOOTER ────────────────────── */
.site-footer {
  background: #0e0c0a;
  border-top: 1px solid rgba(200,169,110,.12);
  padding: 0 0 0;
}

/* Map strip */
.footer-map {
  width: 100%; height: 220px; overflow: hidden; position: relative;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.footer-map iframe {
  width: 100%; height: 100%; border: none; display: block;
  filter: invert(90%) hue-rotate(180deg) saturate(.55) brightness(.8);
}
.footer-map-cta {
  position: absolute; bottom: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(20,18,16,.9); border: 1px solid rgba(200,169,110,.3);
  color: var(--gold); font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 14px;
  backdrop-filter: blur(8px); transition: background .2s;
  text-decoration: none;
}
.footer-map-cta:hover { background: rgba(200,169,110,.12); }
.footer-map-cta svg { flex-shrink: 0; }

/* Main footer body */
.footer-body {
  max-width: 1200px; margin: 0 auto;
  padding: 52px 72px 40px;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 48px;
  align-items: start;
}

/* Column 1 — brand */
.footer-brand {}
.footer-brand-logo { margin-bottom: 20px; }
.footer-brand-logo img { width: 160px; object-fit: contain; }
.footer-brand-tagline { font-size: 12px; line-height: 1.8; color: rgba(200,185,164,.35); margin-bottom: 20px; }
.footer-brand-contact { display: flex; flex-direction: column; gap: 6px; }
.footer-brand-contact a,
.footer-brand-contact span {
  font-size: 12px; color: rgba(200,185,164,.45);
  text-decoration: none; transition: color .2s; line-height: 1.5;
}
.footer-brand-contact a:hover { color: var(--gold); }

/* Columns 2–4 */
.footer-col {}
.footer-col-title {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px; display: block;
}
.footer-col-links { display: flex; flex-direction: column; gap: 10px; }
.footer-col-links a,
.footer-col-links span {
  font-size: 12px; color: rgba(200,185,164,.5);
  text-decoration: none; transition: color .2s; line-height: 1.4;
}
.footer-col-links a:hover { color: var(--cream); }
.footer-col-links .footer-divider {
  height: 1px; background: rgba(200,169,110,.07); margin: 4px 0;
}

/* Bottom bar */
.footer-bottom-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 20px 72px 28px;
  border-top: 1px solid rgba(200,169,110,.07);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
/* Mobile footer */
@media (max-width: 768px) {
  .footer-map { height: 180px; }
  .footer-body {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 40px 20px 32px;
  }
  .footer-brand { grid-column: 1 / -1; }
  .footer-bottom-bar { padding: 16px 20px 24px; flex-direction: column; gap: 6px; text-align: center; }
}
@media (max-width: 480px) {
  .footer-body { grid-template-columns: 1fr; }
}
