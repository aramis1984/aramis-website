<style>
:root {
  --bg:      #1a1814;
  --bg-card: #232019;
  --bg-surf: #2a2620;
  --gold:    #c8a96e;
  --gold-h:  #dcc48e;
  --cream:   #f3e5d2;
  --muted:   #c8b9a4;
  --nav-h:   180px;
  --gutter:  72px;
  --max-w:   1200px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { background: var(--bg); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; overflow-x: hidden; min-height: 100vh; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

/* ─── NAV ────────────────────────────────── */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 900; height: var(--nav-h); display: flex; align-items: center; padding: 0 40px; background: rgba(26,24,20,.85); transition: background .4s, border-color .4s; border-bottom: 1px solid transparent; }
.nav.scrolled { background: rgba(26,24,20,.99); border-bottom-color: rgba(200,169,110,.18); backdrop-filter: blur(16px); }
.nav-left  { display: flex; align-items: center; justify-content: flex-end;  flex: 1; gap: 2px; }
.nav-right { display: flex; align-items: center; justify-content: flex-start; flex: 1; gap: 2px; }
.nav-logo  { padding: 0 28px; flex-shrink: 0; }
.nav-logo img { width: 340px; height: 104px; object-fit: contain; display: block; }
.nav-lk { font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(243,229,210,.65); padding: 10px 22px; transition: color .2s; white-space: nowrap; line-height: 1; cursor: pointer; position: relative; }
.nav-lk:hover, .nav-lk.active { color: var(--gold); }
.nav-dd { position: relative; display: flex; align-items: center; }
.nav-dd-trigger { display: flex; align-items: center; gap: 5px; }
.nav-dd-trigger .chevron { width: 10px; height: 10px; transition: transform .25s; opacity: .5; flex-shrink: 0; }
.nav-dd:hover .chevron, .nav-dd.open .chevron { transform: rotate(180deg); opacity: 1; }
.nav-dd-panel { position: absolute; top: calc(100% + 8px); left: 0; min-width: 220px; background: rgba(22,20,17,.98); border: 1px solid rgba(200,169,110,.15); border-top: 2px solid var(--gold); backdrop-filter: blur(16px); padding: 8px 0; opacity: 0; visibility: hidden; transform: translateY(-4px); transition: opacity .18s ease, transform .18s ease, visibility 0s linear .35s; pointer-events: none; }
.nav-dd-panel.panel-right { left: auto; right: 0; }
.nav-dd-panel::before { content: ''; position: absolute; bottom: 100%; left: 0; right: 0; height: 12px; }
.nav-dd:hover .nav-dd-panel, .nav-dd.open .nav-dd-panel { opacity: 1; visibility: visible; transform: translateY(0); transition: opacity .18s ease, transform .18s ease, visibility 0s linear 0s; pointer-events: auto; }
.nav-dd-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(243,229,210,.6); transition: color .18s, background .18s; white-space: nowrap; }
.nav-dd-item:hover { color: var(--gold); background: rgba(200,169,110,.05); }
.nav-dd-item .dd-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .4; flex-shrink: 0; }
.nav-dd-divider { height: 1px; background: rgba(200,169,110,.08); margin: 6px 0; }
 }

/* ─── COMING SOON HERO ───────────────────── */
.coming-soon {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: calc(var(--nav-h) + 40px) var(--gutter) 80px;
  position: relative;
}
/* Subtle background grid */
.coming-soon::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 79px, rgba(200,169,110,.018) 80px),
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(200,169,110,.018) 80px);
  pointer-events: none;
}
/* Large ghost watermark */
.coming-soon::after {
  content: 'PRO\ASHOP';
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'Fraunces', serif; font-size: clamp(120px, 18vw, 280px);
  font-weight: 300; color: rgba(200,169,110,.03);
  white-space: pre; line-height: 1; pointer-events: none;
  letter-spacing: -8px; text-align: center;
  user-select: none;
}
.cs-inner { position: relative; z-index: 2; max-width: 680px; }
.cs-eyebrow {
  font-size: 9px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 32px;
  display: flex; align-items: center; gap: 16px; justify-content: center;
}
.cs-eyebrow::before, .cs-eyebrow::after { content: ''; width: 28px; height: 1px; background: var(--gold); opacity: .5; }
.cs-hed {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 5vw, 72px);
  font-weight: 400; font-style: italic;
  line-height: 1.1; color: var(--cream);
  margin-bottom: 28px; letter-spacing: -1px;
}
.cs-rule { width: 1px; height: 52px; background: linear-gradient(to bottom, rgba(200,169,110,.4), transparent); margin: 0 auto 28px; }
.cs-body {
  font-size: 16px; line-height: 1.85; color: var(--muted);
  margin-bottom: 48px;
}
.cs-body strong { color: var(--cream); font-weight: 500; }

/* Newsletter form */
.cs-form {
  display: flex; gap: 0; max-width: 440px; margin: 0 auto 16px;
  border: 1px solid rgba(200,169,110,.25);
}
.cs-form input[type="email"] {
  flex: 1; background: var(--bg-card); border: none;
  color: var(--cream); padding: 14px 20px;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 300;
  outline: none; min-width: 0;
}
.cs-form input[type="email"]::placeholder { color: rgba(200,185,164,.3); }
.cs-form input[type="email"]:focus { background: var(--bg-surf); }
.cs-form button {
  background: var(--gold); color: var(--bg); border: none;
  padding: 14px 28px; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; flex-shrink: 0; transition: background .2s; white-space: nowrap;
}
.cs-form button:hover { background: var(--gold-h); }
.cs-form-note { font-size: 11px; color: rgba(200,185,164,.3); margin-top: 10px; }
.cs-success {
  display: none; font-size: 14px; color: var(--gold); font-style: italic;
  font-family: 'Fraunces', serif; padding: 16px 0;
}

/* Divider */
.cs-divider {
  width: 48px; height: 1px; background: rgba(200,169,110,.2);
  margin: 48px auto;
}

/* Urgent contact block */
.cs-contact {
  background: var(--bg-card); border: 1px solid rgba(200,169,110,.1);
  padding: 40px 48px; max-width: 540px; margin: 0 auto;
  text-align: left;
}
.cs-contact-label {
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(200,169,110,.5); margin-bottom: 16px;
}
.cs-contact-hed {
  font-family: 'Fraunces', serif; font-size: clamp(18px, 2vw, 24px);
  font-weight: 400; color: var(--cream); margin-bottom: 14px; line-height: 1.25;
}
.cs-contact-body { font-size: 14px; line-height: 1.75; color: var(--muted); margin-bottom: 24px; }
.cs-contact-rows { display: flex; flex-direction: column; gap: 12px; }
.cs-contact-row { display: flex; align-items: center; gap: 12px; }
.cs-contact-row svg { color: var(--gold); flex-shrink: 0; }
.cs-contact-row a { font-size: 14px; color: var(--gold); border-bottom: 1px solid rgba(200,169,110,.25); transition: border-color .2s; }
.cs-contact-row a:hover { border-color: var(--gold); }
.cs-contact-row span { font-size: 14px; color: var(--muted); }

/* What's coming strip */
.coming-strip {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
  padding: 64px var(--gutter);
}
.coming-strip-inner { max-width: var(--max-w); margin: 0 auto; }
.coming-strip-label {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 14px;
  justify-content: center; margin-bottom: 48px;
}
.coming-strip-label::before, .coming-strip-label::after { content: ''; width: 28px; height: 1px; background: var(--gold); opacity: .5; }
.coming-strip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
.coming-item {
  background: var(--bg-surf); padding: 36px 28px;
  border: 1px solid rgba(200,169,110,.06);
  display: flex; flex-direction: column; gap: 12px;
  position: relative; overflow: hidden;
}
.coming-item-icon { color: rgba(200,169,110,.3); }
.coming-item-name { font-size: 12px; font-weight: 600; letter-spacing: .5px; color: var(--cream); }
.coming-item-desc { font-size: 12px; line-height: 1.65; color: rgba(200,185,164,.5); }
.coming-item-tag {
  font-size: 8px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(200,169,110,.4); margin-top: auto; padding-top: 8px;
  border-top: 1px solid rgba(200,169,110,.08);
}

/* ─── FOOTER ──────────────────────────────── */

@media (max-width: 960px) {
  :root { --gutter: 36px; }
  .coming-strip-grid { grid-template-columns: 1fr 1fr; }
  .cs-form { flex-direction: column; }
  .cs-form button { padding: 14px; }
    }

  .nav-logo img { width: 200px; height: auto; }
  .strip { grid-template-columns: repeat(2, 1fr) !important; }
  .cards-row { grid-template-columns: 1fr 1fr !important; }
  .reviews-grid { grid-template-columns: 1fr 1fr !important; }
  .upcoming-grid { grid-template-columns: 1fr 1fr !important; }
  .gallery-grid { grid-template-columns: 1fr 1fr !important; }
}


/* ─── Hamburger button ───────────────────── */
.nav-hamburger {
  display: none;
  flex-direction: column; justify-content: center; gap: 5px;
  width: 48px; height: 48px; padding: 12px;
  cursor: pointer; background: none; border: none;
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  z-index: 1001; -webkit-tap-highlight-color: transparent;
}
.nav-hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: rgba(243,229,210,.8);
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  transform-origin: center;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ─── Overlay ────────────────────────────── */
.nav-overlay {
  position: fixed; inset: 0; z-index: 998;
  background: #141210;
  display: flex; flex-direction: column;
  clip-path: inset(0 0 100% 0);
  transition: clip-path .5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-overlay.open {
  clip-path: inset(0 0 0% 0);
  pointer-events: all;
}

/* Overlay header */
.ov-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.ov-logo { height: 52px; width: auto; object-fit: contain; }
.ov-close {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: rgba(200,185,164,.5);
  -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-close:hover { color: var(--cream); }

/* Gold rule */
.ov-rule {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,169,110,.25), transparent);
  margin: 0 24px;
  flex-shrink: 0;
}

/* Nav links */
.ov-nav {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 12px 36px 24px;
}
.ov-link {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0;
  border-bottom: 1px solid rgba(200,169,110,.07);
  transition: color .2s, transform .25s;
  -webkit-tap-highlight-color: transparent;
}
.ov-link:last-child { border-bottom: none; }
.ov-link:hover, .ov-link:active { color: var(--cream); transform: translateX(10px); }

/* Sub-group */
.ov-subgroup { border-bottom: 1px solid rgba(200,169,110,.07); }
.ov-subgroup:last-child { border-bottom: none; }
.ov-trigger {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0 12px;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-trigger:hover, .ov-trigger:active { color: var(--cream); }
.ov-trigger-arrow {
  width: 16px; height: 16px; color: rgba(200,169,110,.35);
  transition: transform .3s, color .2s; flex-shrink: 0; margin-top: 4px;
}
.ov-subgroup.expanded .ov-trigger-arrow { transform: rotate(90deg); color: var(--gold); }
.ov-subgroup.expanded .ov-trigger { color: var(--cream); }

.ov-sublinks {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
  padding-left: 4px;
}
.ov-subgroup.expanded .ov-sublinks { max-height: 300px; }
.ov-sublink {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,185,164,.4);
  padding: 10px 0;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.ov-sublink:hover, .ov-sublink:active { color: var(--gold); }
.ov-sublink .ov-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .3; flex-shrink: 0; }

/* Stagger animation */
.ov-link, .ov-trigger {
  opacity: 0; transform: translateY(16px);
  transition: opacity .4s ease, transform .4s ease, color .2s;
}
.nav-overlay.open .ov-link,
.nav-overlay.open .ov-trigger { opacity: 1; transform: translateY(0); }
.nav-overlay.open .ov-nav > *:nth-child(1) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(1).ov-link { transition-delay: .12s; }
.nav-overlay.open .ov-nav > *:nth-child(2) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(2).ov-link { transition-delay: .19s; }
.nav-overlay.open .ov-nav > *:nth-child(3) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(3).ov-link { transition-delay: .26s; }
.nav-overlay.open .ov-nav > *:nth-child(4) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(4).ov-link { transition-delay: .33s; }
.nav-overlay.open .ov-nav > *:nth-child(5) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(5).ov-link { transition-delay: .40s; }
.nav-overlay.open .ov-nav > *:nth-child(6).ov-link { transition-delay: .47s; }

/* Overlay footer */
.ov-footer {
  padding: 20px 36px 40px;
  border-top: 1px solid rgba(200,169,110,.08);
  flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
}
.ov-footer-hours { font-size: 11px; color: rgba(200,185,164,.3); margin-bottom: 3px; }
.ov-footer-addr  { font-size: 11px; color: rgba(200,185,164,.2); }
.ov-footer-ig { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(200,169,110,.4); transition: color .2s; }
.ov-footer-ig:hover { color: var(--gold); }

/* Show hamburger, fix nav height & logo on mobile */
{ display: none; }
  .nav { height: 90px !important; justify-content: center; }

  .nav { height: 90px !important; justify-content: center; }



/* ── CANONICAL FOOTER ────────────────────── */
.site-footer {
  background: #0e0c0a;
  border-top: 1px solid rgba(200,169,110,.12);
  padding: 0 0 0;
}

/* Map strip */
.footer-map {
  width: 100%; height: 220px; overflow: hidden; position: relative;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.footer-map iframe {
  width: 100%; height: 100%; border: none; display: block;
  filter: invert(90%) hue-rotate(180deg) saturate(.55) brightness(.8);
}
.footer-map-cta {
  position: absolute; bottom: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(20,18,16,.9); border: 1px solid rgba(200,169,110,.3);
  color: var(--gold); font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 14px;
  backdrop-filter: blur(8px); transition: background .2s;
  text-decoration: none;
}
.footer-map-cta:hover { background: rgba(200,169,110,.12); }
.footer-map-cta svg { flex-shrink: 0; }

/* Main footer body */
.footer-body {
  max-width: 1200px; margin: 0 auto;
  padding: 52px 72px 40px;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 48px;
  align-items: start;
}

/* Column 1 — brand */
.footer-brand {}
.footer-brand-logo { margin-bottom: 20px; }
.footer-brand-logo img { width: 160px; object-fit: contain; }
.footer-brand-tagline { font-size: 12px; line-height: 1.8; color: rgba(200,185,164,.35); margin-bottom: 20px; }
.footer-brand-contact { display: flex; flex-direction: column; gap: 6px; }
.footer-brand-contact a,
.footer-brand-contact span {
  font-size: 12px; color: rgba(200,185,164,.45);
  text-decoration: none; transition: color .2s; line-height: 1.5;
}
.footer-brand-contact a:hover { color: var(--gold); }

/* Columns 2–4 */
.footer-col {}
.footer-col-title {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px; display: block;
}
.footer-col-links { display: flex; flex-direction: column; gap: 10px; }
.footer-col-links a,
.footer-col-links span {
  font-size: 12px; color: rgba(200,185,164,.5);
  text-decoration: none; transition: color .2s; line-height: 1.4;
}
.footer-col-links a:hover { color: var(--cream); }
.footer-col-links .footer-divider {
  height: 1px; background: rgba(200,169,110,.07); margin: 4px 0;
}

/* Bottom bar */
.footer-bottom-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 20px 72px 28px;
  border-top: 1px solid rgba(200,169,110,.07);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
/* Mobile footer */
@media (max-width: 768px) {
  .footer-map { height: 180px; }
  .footer-body {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 40px 20px 32px;
  }
  .footer-brand { grid-column: 1 / -1; }
  .footer-bottom-bar { padding: 16px 20px 24px; flex-direction: column; gap: 6px; text-align: center; }
}
@media (max-width: 480px) {
  .footer-body { grid-template-columns: 1fr; }
}
