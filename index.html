<style>
/* ── TOKENS ── */
:root {
  --bg:      #1a1814;
  --bg-card: #232019;
  --bg-surf: #2a2620;
  --coral:   #c8a96e;
  --coral-h: #dcc48e;
  --cream:   #f3e5d2;
  --muted:   #c8b9a4;
  --gold:    #c8a96e;
  --olive:   #6b7a5a;
  --nav-h:   72px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { background: var(--bg); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
img { display: block; }
a { text-decoration: none; color: inherit; }

/* ── NAV ── */
:root { --nav-h: 180px; }
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--nav-h);
  display: flex; align-items: center;
  padding: 0 40px;
  background: rgba(26,24,20,.85);
  transition: background .4s, border-color .4s;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(26,24,20,.97);
  border-bottom-color: rgba(200,169,110,.12);
  backdrop-filter: blur(12px);
}
.nav-left  { display: flex; align-items: center; justify-content: flex-end;  flex: 1; gap: 2px; }
.nav-right { display: flex; align-items: center; justify-content: flex-start; flex: 1; gap: 2px; }
.nav-logo  { padding: 0 28px; flex-shrink: 0; }
.nav-logo img { width: 340px; height: 104px; object-fit: contain; display: block; transition: opacity .2s; }
.nav-logo img:hover { opacity: .85; }
.nav-lk {
  font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px; text-transform: uppercase;
  color: rgba(243,229,210,.65); padding: 10px 22px; transition: color .2s;
  white-space: nowrap; line-height: 1; cursor: pointer; position: relative;
}
.nav-lk:hover, .nav-lk.active { color: var(--gold); }
.nav-dd { position: relative; display: flex; align-items: center; }
.nav-dd-trigger { display: flex; align-items: center; gap: 5px; }
.nav-dd-trigger .chevron { width: 10px; height: 10px; transition: transform .25s; opacity: .5; flex-shrink: 0; }
.nav-dd:hover .chevron, .nav-dd.open .chevron { transform: rotate(180deg); opacity: 1; }
.nav-dd-panel {
  position: absolute; top: calc(100% + 8px); left: 0; min-width: 220px;
  background: rgba(22,20,17,.98); border: 1px solid rgba(200,169,110,.15);
  border-top: 2px solid var(--gold); backdrop-filter: blur(16px); padding: 8px 0;
  opacity: 0; visibility: hidden; transform: translateY(-4px);
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear .35s; pointer-events: none;
}
.nav-dd-panel.panel-right { left: auto; right: 0; }
.nav-dd-panel::before { content: ''; position: absolute; bottom: 100%; left: 0; right: 0; height: 12px; }
.nav-dd:hover .nav-dd-panel, .nav-dd.open .nav-dd-panel {
  opacity: 1; visibility: visible; transform: translateY(0);
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear 0s; pointer-events: auto;
}
.nav-dd-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase;
  color: rgba(243,229,210,.6); transition: color .18s, background .18s; white-space: nowrap;
}
.nav-dd-item:hover { color: var(--gold); background: rgba(200,169,110,.05); }
.nav-dd-item .dd-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .4; flex-shrink: 0; }
.nav-dd-divider { height: 1px; background: rgba(200,169,110,.08); margin: 6px 0; }
 .nav { justify-content: center; } .nav-logo { padding: 0; } .nav-logo img { width: 220px !important; height: auto !important; } }

/* ── HERO ── */
.hero {
  position: relative;
  height: 100vh; min-height: 700px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  text-align: center;
}
/* video-ready: swap <img> for <video autoplay muted loop playsinline> when reel is ready */
.hero-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 38%;
}
.hero-ov {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(26,24,20,.52) 0%,
    rgba(26,24,20,.08) 30%,
    rgba(26,24,20,.08) 60%,
    rgba(26,24,20,.82) 100%
  );
}
.hero-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  padding: 0 32px;
}
.hero-hed {
  font-family: 'Fraunces', serif; font-size: clamp(40px, 5.5vw, 80px);
  font-weight: 400; font-style: italic; letter-spacing: -1px; line-height: 1.08;
  color: var(--cream); margin-bottom: 32px; max-width: 720px;
}
.hero-rule { width: 48px; height: 1px; background: rgba(200,169,110,.4); margin: 0 auto 28px; }
.hero-ctas { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }
.btn-pr {
  display: inline-block; padding: 14px 36px;
  background: var(--coral); color: var(--bg);
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  border: none; cursor: pointer; transition: background .2s;
}
.btn-pr:hover { background: var(--coral-h); }
.btn-gh {
  display: inline-block; padding: 13px 32px;
  background: rgba(26,24,20,.85); color: var(--cream-muted, var(--muted));
  font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
  border: 1px solid rgba(200,169,110,.35); transition: all .2s;
}
.btn-gh:hover { border-color: var(--gold); color: var(--gold); }

/* scroll hint */
.hero-scroll {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2;
}
.hero-scroll span { font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(200,185,164,.55); }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, rgba(200,169,110,.5), transparent); }

/* ── TICKER ── */
.ticker { background: var(--coral); overflow: hidden; }
.ticker-inner { display: flex; white-space: nowrap; animation: tick 28s linear infinite; }
@keyframes tick { from { transform: translateX(0); } to { transform: translateX(var(--ticker-shift, -50%)); } }
.tick-item {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 15px 28px;
  font-size: 9.5px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(26,24,20,.82);
}
.tick-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(26,24,20,.3); flex-shrink: 0; }

/* ── IDENTITY STRIP ── */
.strip {
  background: var(--bg-card);
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid rgba(200,169,110,.07);
}
.strip-item {
  padding: 52px 40px;
  border-left: 1px solid rgba(200,169,110,.1);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  text-align: center;
}
.strip-item:first-child { border-left: none; }
.strip-icon svg { display: block; margin: 0 auto; }
.strip-icon { color: var(--gold); }
.strip-icon svg { display: block; }
.strip-num {
  font-family: 'Fraunces', serif; font-size: 58px; font-weight: 400;
  color: var(--gold); line-height: 1;
}
.strip-label {
  font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: var(--cream); margin-top: -4px;
}
.strip-desc { font-size: 13px; line-height: 1.65; color: rgba(200,185,164,.65); }

/* ── SECTION TAG ── */
.stag {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 14px; margin-bottom: 22px;
}
.stag::before { content: ''; width: 28px; height: 1px; background: var(--gold); flex-shrink: 0; }

/* ── EXPERIENCE (split) ── */
.exp { display: grid; grid-template-columns: 1fr 1fr; min-height: 600px; }
.exp-ph { overflow: hidden; }
.exp-ph img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
.exp-tx {
  background: var(--bg); padding: 80px 72px;
  display: flex; flex-direction: column; justify-content: center;
  border-top: 1px solid rgba(200,169,110,.07);
}
.exp-hed {
  font-family: 'Fraunces', serif; font-size: clamp(30px, 3.2vw, 50px);
  font-weight: 400; line-height: 1.13; color: var(--cream); margin-bottom: 22px;
}
.exp-body { font-size: 15px; line-height: 1.83; color: var(--muted); margin-bottom: 36px; max-width: 480px; }

/* ── TERRACE (full-bleed) ── */
.terrace { position: relative; height: 68vh; min-height: 500px; overflow: hidden; }
.terrace img { width: 100%; height: 100%; object-fit: cover; object-position: center 28%; }
.terrace-ov {
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(26,24,20,.9) 0%, rgba(26,24,20,.55) 45%, rgba(26,24,20,.1) 75%, transparent 100%);
}
.terrace-ct {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  justify-content: center; padding: 0 80px; max-width: 580px;
}
.terrace-hed {
  font-family: 'Fraunces', serif; font-size: clamp(30px, 3.5vw, 54px);
  font-weight: 400; line-height: 1.12; color: var(--cream); margin-bottom: 20px;
}
.terrace-body { font-size: 14px; line-height: 1.82; color: var(--muted); margin-bottom: 32px; max-width: 420px; }

/* ── CARDS ROW ── */
.cards-section { background: var(--bg-card); padding: 2px; }
.cards-row { display: grid; grid-template-columns: 1fr 1fr 1.55fr; gap: 2px; }

/* featured coral card */
.card-feat {
  background: var(--coral); padding: 56px 48px;
  display: flex; flex-direction: column; justify-content: space-between;
  align-items: center; text-align: center;
  min-height: 380px;
}
.card-feat-icon { color: rgba(26,24,20,.55); margin-bottom: 32px; }
.card-feat-icon svg { display: block; }
.card-feat-tag { font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(26,24,20,.6); margin-bottom: 10px; }
.card-feat-hed {
  font-family: 'Fraunces', serif; font-size: 28px;
  font-weight: 400; color: rgba(26,24,20,.88); line-height: 1.2;
}
.card-feat-body { font-size: 13px; line-height: 1.72; color: rgba(26,24,20,.65); margin: 14px 0 0; }
.card-feat-lk {
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(26,24,20,.85); display: flex; align-items: center; gap: 10px;
  margin-top: 40px; transition: gap .2s;
}
.card-feat-lk:hover { gap: 16px; }
.card-feat-lk::after { content: '→'; font-size: 14px; }

/* side cards */
.card-side {
  background: var(--bg-surf); padding: 48px 40px;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  border-top: 3px solid transparent; transition: border-color .25s;
}
.card-side:hover { border-top-color: var(--coral); }
.card-side-icon { color: var(--gold); margin-bottom: 24px; }
.card-side-icon svg { display: block; }
.card-tag {
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
}
.card-hed {
  font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400;
  color: var(--cream); line-height: 1.2; margin-bottom: 14px;
}
.card-body { font-size: 13px; line-height: 1.72; color: var(--muted); flex: 1; }
.card-lk {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--coral); margin-top: 28px; display: flex; align-items: center; gap: 8px;
  transition: gap .2s;
}
.card-lk:hover { gap: 14px; }
.card-lk::after { content: '→'; font-size: 13px; }

/* ── EVENTS BAND ── */
.events {
  padding: 88px 80px;
  display: grid; grid-template-columns: 1fr 1px 1fr; gap: 72px;
  align-items: center;
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
}
.events-divider { background: rgba(200,169,110,.12); align-self: stretch; }
.ev-hed {
  font-family: 'Fraunces', serif; font-size: clamp(28px, 3vw, 44px);
  font-weight: 400; line-height: 1.15; color: var(--cream); margin-bottom: 14px;
}
.ev-body { font-size: 14px; line-height: 1.8; color: var(--muted); margin-bottom: 32px; }

/* ── FOOTER ── */

.footer-top {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 56px;
  padding-bottom: 56px; border-bottom: 1px solid rgba(200,169,110,.07);
}
.ft-brand-logo img { width: 210px; margin-bottom: 22px; object-fit: fill; }
.ft-addr { font-size: 13px; line-height: 1.9; color: var(--muted); }
.ft-col h4 {
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
}
.ft-col a, .ft-col p {
  display: block; font-size: 13px; color: var(--muted); line-height: 2.1;
  transition: color .2s;
}
.ft-col a:hover { color: var(--coral); }
.footer-btm {
  padding: 20px 0;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-btm span { font-size: 11px; color: rgba(200,185,164,.3); }

/* ── TWEAKS ── */
.tweaks-panel {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  background: rgba(35,32,25,.97); border: 1px solid rgba(200,169,110,.22);
  padding: 22px 24px; width: 240px; backdrop-filter: blur(10px);
  display: none;
}
.tweaks-panel.visible { display: block; }
.tw-title { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
.tw-row { margin-bottom: 14px; }
.tw-lbl { font-size: 10px; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
.tw-sel { background: rgba(26,24,20,.9); border: 1px solid rgba(200,169,110,.2); color: var(--cream); font-family: 'Plus Jakarta Sans'; font-size: 12px; padding: 7px 10px; width: 100%; cursor: pointer; }
.tw-range { width: 100%; accent-color: var(--coral); margin-top: 4px; }

/* ── REVIEWS SECTION ── */
.reviews-section {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  padding: 100px 80px;
}
.reviews-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; margin-bottom: 56px; flex-wrap: wrap;
}
.reviews-header-left {}
.reviews-stag {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}
.reviews-stag::before { content: ''; width: 28px; height: 1px; background: var(--gold); }
.reviews-hed {
  font-family: 'Fraunces', serif;
  font-size: clamp(28px, 3.5vw, 48px);
  font-weight: 400; line-height: 1.13; color: var(--cream);
}
.reviews-overall {
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0;
}
.reviews-stars-large { color: var(--gold); font-size: 22px; letter-spacing: 3px; line-height: 1; }
.reviews-score {
  font-family: 'Fraunces', serif; font-size: 42px; font-weight: 300;
  color: var(--cream); line-height: 1;
}
.reviews-count { font-size: 12px; color: rgba(200,185,164,.45); letter-spacing: .5px; }
.reviews-source { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,169,110,.5); margin-top: 2px; }

/* Review card grid */
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}
.review-card {
  background: var(--bg-surf); padding: 40px 36px;
  border: 1px solid rgba(200,169,110,.06);
  display: flex; flex-direction: column; gap: 0;
  position: relative; overflow: hidden;
  transition: border-color .3s;
}
.review-card:hover { border-color: rgba(200,169,110,.18); }
.review-card::before {
  content: 'C';
  position: absolute; top: -12px; right: 20px;
  font-family: 'Fraunces', serif; font-size: 120px; font-weight: 400;
  color: rgba(200,169,110,.05); line-height: 1; pointer-events: none;
}
.review-stars { color: var(--gold); font-size: 13px; letter-spacing: 3px; margin-bottom: 20px; }
.review-topic {
  font-size: 8px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(200,169,110,.5); margin-bottom: 14px; display: block;
}
.review-text {
  font-family: 'Fraunces', serif; font-size: clamp(15px, 1.5vw, 18px);
  font-weight: 400; font-style: italic;
  line-height: 1.65; color: var(--cream); flex: 1; margin-bottom: 24px;
}
.review-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.review-author { font-size: 12px; color: rgba(200,185,164,.5); }
.review-platform {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(200,169,110,.35);
}

/* CTA row below grid */
.reviews-ctas {
  display: flex; align-items: center; gap: 16px; margin-top: 48px; flex-wrap: wrap;
}
.reviews-note {
  font-size: 12px; color: rgba(200,185,164,.3); line-height: 1.6; margin-top: 24px;
}
.reviews-note a { color: var(--gold); border-bottom: 1px solid rgba(200,169,110,.25); }

  .nav-logo img { width: 200px; height: auto; }
  .strip { grid-template-columns: repeat(2, 1fr) !important; }
  .cards-row { grid-template-columns: 1fr 1fr !important; }
  .reviews-grid { grid-template-columns: 1fr 1fr !important; }
  .upcoming-grid { grid-template-columns: 1fr 1fr !important; }
  .gallery-grid { grid-template-columns: 1fr 1fr !important; }
}





/* ══════════════════════════════════════════════
   ARAMIS MOBILE — Full-Screen Overlay Nav
   ══════════════════════════════════════════════ */

/* ─── Hamburger button ───────────────────── */
.nav-hamburger {
  display: none;
  flex-direction: column; justify-content: center; gap: 5px;
  width: 48px; height: 48px; padding: 12px;
  cursor: pointer; background: none; border: none;
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  z-index: 1001; -webkit-tap-highlight-color: transparent;
}
.nav-hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: rgba(243,229,210,.8);
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  transform-origin: center;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ─── Overlay ────────────────────────────── */
.nav-overlay {
  position: fixed; inset: 0; z-index: 998;
  background: #141210;
  display: flex; flex-direction: column;
  clip-path: inset(0 0 100% 0);
  transition: clip-path .5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-overlay.open {
  clip-path: inset(0 0 0% 0);
  pointer-events: all;
}

/* Overlay header */
.ov-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.ov-logo { height: 52px; width: auto; object-fit: contain; }
.ov-close {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: rgba(200,185,164,.5);
  -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-close:hover { color: var(--cream); }

/* Gold rule */
.ov-rule {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,169,110,.25), transparent);
  margin: 0 24px;
  flex-shrink: 0;
}

/* Nav links */
.ov-nav {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 12px 36px 24px;
}
.ov-link {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0;
  border-bottom: 1px solid rgba(200,169,110,.07);
  transition: color .2s, transform .25s;
  -webkit-tap-highlight-color: transparent;
}
.ov-link:last-child { border-bottom: none; }
.ov-link:hover, .ov-link:active { color: var(--cream); transform: translateX(10px); }

/* Sub-group */
.ov-subgroup { border-bottom: 1px solid rgba(200,169,110,.07); }
.ov-subgroup:last-child { border-bottom: none; }
.ov-trigger {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0 12px;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-trigger:hover, .ov-trigger:active { color: var(--cream); }
.ov-trigger-arrow {
  width: 16px; height: 16px; color: rgba(200,169,110,.35);
  transition: transform .3s, color .2s; flex-shrink: 0; margin-top: 4px;
}
.ov-subgroup.expanded .ov-trigger-arrow { transform: rotate(90deg); color: var(--gold); }
.ov-subgroup.expanded .ov-trigger { color: var(--cream); }

.ov-sublinks {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
  padding-left: 4px;
}
.ov-subgroup.expanded .ov-sublinks { max-height: 300px; }
.ov-sublink {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,185,164,.4);
  padding: 10px 0;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.ov-sublink:hover, .ov-sublink:active { color: var(--gold); }
.ov-sublink .ov-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .3; flex-shrink: 0; }

/* Stagger animation */
.ov-link, .ov-trigger {
  opacity: 0; transform: translateY(16px);
  transition: opacity .4s ease, transform .4s ease, color .2s;
}
.nav-overlay.open .ov-link,
.nav-overlay.open .ov-trigger { opacity: 1; transform: translateY(0); }
.nav-overlay.open *:nth-child(1) { transition-delay: .1s; }
.nav-overlay.open .ov-nav > *:nth-child(1) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(1).ov-link { transition-delay: .12s; }
.nav-overlay.open .ov-nav > *:nth-child(2) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(2).ov-link { transition-delay: .19s; }
.nav-overlay.open .ov-nav > *:nth-child(3) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(3).ov-link { transition-delay: .26s; }
.nav-overlay.open .ov-nav > *:nth-child(4) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(4).ov-link { transition-delay: .33s; }
.nav-overlay.open .ov-nav > *:nth-child(5) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(5).ov-link { transition-delay: .40s; }
.nav-overlay.open .ov-nav > *:nth-child(6).ov-link { transition-delay: .47s; }

/* Overlay footer */
.ov-footer {
  padding: 20px 36px 40px;
  border-top: 1px solid rgba(200,169,110,.08);
  flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
}
.ov-footer-hours { font-size: 11px; color: rgba(200,185,164,.3); margin-bottom: 3px; }
.ov-footer-addr  { font-size: 11px; color: rgba(200,185,164,.2); }
.ov-footer-ig { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(200,169,110,.4); transition: color .2s; }
.ov-footer-ig:hover { color: var(--gold); }

/* ── CANONICAL FOOTER ────────────────────── */
.site-footer {
  background: #0e0c0a;
  border-top: 1px solid rgba(200,169,110,.12);
  padding: 0 0 0;
}

/* Map strip */
.footer-map {
  width: 100%; height: 220px; overflow: hidden; position: relative;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.footer-map iframe {
  width: 100%; height: 100%; border: none; display: block;
  filter: invert(90%) hue-rotate(180deg) saturate(.55) brightness(.8);
}
.footer-map-cta {
  position: absolute; bottom: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(20,18,16,.9); border: 1px solid rgba(200,169,110,.3);
  color: var(--gold); font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 14px;
  backdrop-filter: blur(8px); transition: background .2s;
  text-decoration: none;
}
.footer-map-cta:hover { background: rgba(200,169,110,.12); }
.footer-map-cta svg { flex-shrink: 0; }

/* Main footer body */
.footer-body {
  max-width: 1200px; margin: 0 auto;
  padding: 52px 72px 40px;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 48px;
  align-items: start;
}

/* Column 1 — brand */
.footer-brand {}
.footer-brand-logo { margin-bottom: 20px; }
.footer-brand-logo img { width: 160px; object-fit: contain; }
.footer-brand-tagline { font-size: 12px; line-height: 1.8; color: rgba(200,185,164,.35); margin-bottom: 20px; }
.footer-brand-contact { display: flex; flex-direction: column; gap: 6px; }
.footer-brand-contact a,
.footer-brand-contact span {
  font-size: 12px; color: rgba(200,185,164,.45);
  text-decoration: none; transition: color .2s; line-height: 1.5;
}
.footer-brand-contact a:hover { color: var(--gold); }

/* Columns 2–4 */
.footer-col {}
.footer-col-title {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px; display: block;
}
.footer-col-links { display: flex; flex-direction: column; gap: 10px; }
.footer-col-links a,
.footer-col-links span {
  font-size: 12px; color: rgba(200,185,164,.5);
  text-decoration: none; transition: color .2s; line-height: 1.4;
}
.footer-col-links a:hover { color: var(--cream); }
.footer-col-links .footer-divider {
  height: 1px; background: rgba(200,169,110,.07); margin: 4px 0;
}

/* Bottom bar */
.footer-bottom-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 20px 72px 28px;
  border-top: 1px solid rgba(200,169,110,.07);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
/* Mobile footer */
@media (max-width: 768px) {
  .footer-map { height: 180px; }
  .footer-body {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 40px 20px 32px;
  }
  .footer-brand { grid-column: 1 / -1; }
  .footer-bottom-bar { padding: 16px 20px 24px; flex-direction: column; gap: 6px; text-align: center; }
}
@media (max-width: 480px) {
  .footer-body { grid-template-columns: 1fr; }
}
