<style>

:root {
  --bg:      #1a1814;
  --bg-card: #232019;
  --bg-surf: #2a2620;
  --gold:    #c8a96e;
  --gold-h:  #dcc48e;
  --cream:   #f3e5d2;
  --muted:   #c8b9a4;
  --nav-h:   180px;
  --gutter:  72px;
  --max-w:   1200px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { background: var(--bg); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

/* ─── NAV (same as tournaments) ─────────── */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 900; height: var(--nav-h); display: flex; align-items: center; padding: 0 40px; background: rgba(26,24,20,.85); transition: background .4s, border-color .4s; border-bottom: 1px solid transparent; }
.nav.scrolled { background: rgba(26,24,20,.99); border-bottom-color: rgba(200,169,110,.18); backdrop-filter: blur(16px); }
.nav-left  { display: flex; align-items: center; justify-content: flex-end;  flex: 1; gap: 2px; }
.nav-right { display: flex; align-items: center; justify-content: flex-start; flex: 1; gap: 2px; }
.nav-logo  { padding: 0 28px; flex-shrink: 0; }
.nav-logo img { width: 340px; height: 104px; object-fit: contain; display: block; }
.nav-lk { font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(243,229,210,.65); padding: 10px 22px; transition: color .2s; white-space: nowrap; line-height: 1; cursor: pointer; position: relative; }
.nav-lk:hover, .nav-lk.active { color: var(--gold); }
.nav-dd { position: relative; display: flex; align-items: center; }
.nav-dd-trigger { display: flex; align-items: center; gap: 5px; }
.nav-dd-trigger .chevron { width: 10px; height: 10px; transition: transform .25s; opacity: .5; flex-shrink: 0; }
.nav-dd:hover .chevron, .nav-dd.open .chevron { transform: rotate(180deg); opacity: 1; }
.nav-dd-panel { position: absolute; top: calc(100% + 8px); left: 0; min-width: 220px; background: rgba(22,20,17,.98); border: 1px solid rgba(200,169,110,.15); border-top: 2px solid var(--gold); backdrop-filter: blur(16px); padding: 8px 0; opacity: 0; visibility: hidden; transform: translateY(-4px); transition: opacity .18s ease, transform .18s ease, visibility 0s linear .35s; pointer-events: none; }
.nav-dd-panel.panel-right { left: auto; right: 0; }
.nav-dd-panel::before { content: ''; position: absolute; bottom: 100%; left: 0; right: 0; height: 12px; }
.nav-dd:hover .nav-dd-panel, .nav-dd.open .nav-dd-panel { opacity: 1; visibility: visible; transform: translateY(0); transition: opacity .18s ease, transform .18s ease, visibility 0s linear 0s; pointer-events: auto; }
.nav-dd-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(243,229,210,.6); transition: color .18s, background .18s; white-space: nowrap; }
.nav-dd-item:hover { color: var(--gold); background: rgba(200,169,110,.05); }
.nav-dd-item .dd-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .4; flex-shrink: 0; }
.nav-dd-divider { height: 1px; background: rgba(200,169,110,.08); margin: 6px 0; }
 }

/* ─── HERO ───────────────────────────────── */
.hero { position: relative; height: 100vh; min-height: 680px; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
.hero-img { position: absolute; inset: 0; background: #141210; }
.hero-img img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; filter: saturate(.75) brightness(.45); }
.hero-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; border: 1px dashed rgba(200,169,110,.1); margin: 80px var(--gutter); }
.hero-placeholder svg { color: rgba(200,169,110,.15); }
.hero-placeholder span { font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(200,169,110,.2); }
.hero-ov { position: absolute; inset: 0; z-index: 1; background: linear-gradient(to bottom, rgba(26,24,20,.5) 0%, rgba(26,24,20,.1) 30%, rgba(26,24,20,.1) 55%, rgba(26,24,20,.88) 100%); }
.hero-content { position: relative; z-index: 2; padding: calc(var(--nav-h) + 20px) var(--gutter) 40px; max-width: 860px; }
.hero-eyebrow { font-size: 9px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 28px; display: flex; align-items: center; gap: 16px; justify-content: center; }
.hero-eyebrow::before, .hero-eyebrow::after { content: ''; width: 28px; height: 1px; background: var(--gold); opacity: .5; }
.hero-hed { font-family: 'Fraunces', serif; font-size: clamp(44px, 6.5vw, 88px); font-weight: 400; font-style: italic; line-height: 1.07; color: var(--cream); margin-bottom: 24px; letter-spacing: -1px; }
.hero-rule { width: 1px; height: 52px; background: linear-gradient(to bottom, rgba(200,169,110,.45), transparent); margin: 0 auto 22px; }
.hero-sub { font-size: 14px; line-height: 1.7; color: rgba(200,185,164,.5); }
.hero-scroll { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 2; }
.hero-scroll span { font-size: 8px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(200,185,164,.3); }
.scroll-line { width: 1px; height: 44px; background: linear-gradient(to bottom, rgba(200,169,110,.4), transparent); }

/* ─── SHARED ─────────────────────────────── */
.stag { font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.stag::before { content: ''; width: 28px; height: 1px; background: var(--gold); flex-shrink: 0; }
.sec-hed { font-family: 'Fraunces', serif; font-size: clamp(28px, 3.2vw, 46px); font-weight: 400; line-height: 1.13; color: var(--cream); margin-bottom: 24px; }
.sec-body { font-size: 15px; line-height: 1.85; color: var(--muted); margin-bottom: 20px; }
.sec-body:last-child { margin-bottom: 0; }
.btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 14px 36px; background: var(--gold); color: var(--bg); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; transition: background .2s; }
.btn-primary:hover { background: var(--gold-h); }
.btn-ghost { display: inline-flex; align-items: center; gap: 10px; padding: 13px 28px; background: rgba(26,24,20,.85); color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; border: 1px solid rgba(200,169,110,.3); transition: all .25s; }
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.btn-ghost svg, .btn-primary svg { transition: transform .25s; }
.btn-ghost:hover svg, .btn-primary:hover svg { transform: translateX(4px); }

/* ─── UPCOMING EVENTS ────────────────────── */
.upcoming { background: var(--bg-card); border-top: 1px solid rgba(200,169,110,.07); border-bottom: 1px solid rgba(200,169,110,.07); }
.upcoming-inner { max-width: var(--max-w); margin: 0 auto; padding: 100px var(--gutter); }

/* Event cards — horizontal layout with poster left */
.event-list { display: flex; flex-direction: column; gap: 2px; margin-top: 52px; }
.event-card {
  display: grid;
  grid-template-columns: 280px 1fr;
  background: var(--bg-surf);
  border: 1px solid rgba(200,169,110,.06);
  overflow: hidden;
  transition: border-color .3s;
}
.event-card:hover { border-color: rgba(200,169,110,.2); }

/* Poster — the event announcement image / poster */
.event-poster { position: relative; overflow: hidden; background: #0e0d0b; min-height: 320px; }
.event-poster img { width: 100%; height: 100%; object-fit: cover; object-position: center; filter: saturate(.85) brightness(.85); transition: transform .5s ease; }
.event-card:hover .event-poster img { transform: scale(1.04); }
.event-poster-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
.event-poster-placeholder svg { color: rgba(200,169,110,.1); }
.event-poster-placeholder span { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,169,110,.18); text-align: center; }

/* Event info */
.event-body { padding: 44px 52px; display: flex; flex-direction: column; justify-content: center; border-left: 2px solid rgba(200,169,110,.08); transition: border-color .3s; }
.event-card:hover .event-body { border-left-color: var(--gold); }
.event-date { font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.event-name { font-family: 'Fraunces', serif; font-size: clamp(22px, 2.5vw, 32px); font-weight: 400; color: var(--cream); line-height: 1.2; margin-bottom: 12px; }
.event-desc { font-size: 14px; line-height: 1.75; color: var(--muted); margin-bottom: 20px; }
.event-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
.event-tag { font-size: 8.5px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border: 1px solid rgba(200,169,110,.18); color: rgba(200,169,110,.6); }

/* Empty state */
.event-empty { text-align: center; padding: 80px 0; }
.event-empty-hed { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 400; font-style: italic; color: rgba(200,185,164,.3); margin-bottom: 16px; }
.event-empty-sub { font-size: 14px; color: rgba(200,185,164,.25); line-height: 1.7; }
.event-empty-sub a { color: var(--gold); border-bottom: 1px solid rgba(200,169,110,.3); }

/* ─── WHAT TO EXPECT ─────────────────────── */
.expect { background: var(--bg); border-top: 1px solid rgba(200,169,110,.07); }
.expect-inner { max-width: var(--max-w); margin: 0 auto; padding: 100px var(--gutter); display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.expect-photo { position: relative; overflow: hidden; background: var(--bg-surf); aspect-ratio: 4/3; }
.expect-photo img { width: 100%; height: 100%; object-fit: cover; filter: saturate(.8) brightness(.65); transition: transform 8s ease; }
.expect-photo:hover img { transform: scale(1.04); }
.expect-ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.expect-ph svg { color: rgba(200,169,110,.12); }
.expect-ph span { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,169,110,.18); text-align: center; }

/* ─── YOUR EVENT / PRIVATE HIRE ──────────── */
.your-event { background: var(--bg-card); border-top: 1px solid rgba(200,169,110,.07); border-bottom: 1px solid rgba(200,169,110,.07); }
.your-event-inner { max-width: var(--max-w); margin: 0 auto; padding: 100px var(--gutter); display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }

/* Occasion types */
.occasions { display: flex; flex-direction: column; gap: 2px; margin-top: 32px; }
.occasion-item { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--bg-surf); border-left: 2px solid transparent; transition: border-color .25s, background .25s; }
.occasion-item:hover { border-left-color: var(--gold); background: var(--bg); }
.occasion-icon { color: var(--gold); flex-shrink: 0; }
.occasion-name { font-size: 13px; font-weight: 400; color: var(--cream); }

/* Enquiry form */
.enquiry-form { background: var(--bg-surf); padding: 48px; border: 1px solid rgba(200,169,110,.1); }
.form-title { font-family: 'Fraunces', serif; font-size: clamp(20px, 2vw, 28px); font-weight: 400; color: var(--cream); margin-bottom: 8px; line-height: 1.2; }
.form-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
.form-grid { display: flex; flex-direction: column; gap: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field label { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,169,110,.55); }
.form-field input,
.form-field select,
.form-field textarea {
  background: var(--bg); border: 1px solid rgba(200,169,110,.15);
  color: var(--cream); padding: 12px 16px;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 300;
  transition: border-color .2s; outline: none; width: 100%;
}
.form-field input:focus,
.form-field select:focus,
.form-field textarea:focus { border-color: var(--gold); }
.form-field select { appearance: none; cursor: pointer; }
.form-field textarea { resize: vertical; min-height: 100px; }
.form-submit { margin-top: 8px; }
.form-submit button {
  width: 100%; padding: 15px 32px;
  background: var(--gold); color: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  border: none; cursor: pointer; transition: background .2s;
}
.form-submit button:hover { background: var(--gold-h); }
.form-note { font-size: 11px; color: rgba(200,185,164,.35); margin-top: 12px; text-align: center; }

/* Direct contact */
.direct-contact { margin-top: 36px; display: flex; flex-direction: column; gap: 10px; }
.contact-row { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
.contact-row svg { color: var(--gold); flex-shrink: 0; }
.contact-row a { color: var(--gold); border-bottom: 1px solid rgba(200,169,110,.25); transition: border-color .2s; }
.contact-row a:hover { border-color: var(--gold); }

/* ─── PAST EVENTS GALLERY ────────────────── */
.gallery-section { background: var(--bg); border-top: 1px solid rgba(200,169,110,.07); }
.gallery-inner { max-width: var(--max-w); margin: 0 auto; padding: 100px var(--gutter); }
.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin-top: 52px; }
.gallery-item { aspect-ratio: 4/3; position: relative; overflow: hidden; background: var(--bg-surf); cursor: pointer; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; filter: saturate(.75) brightness(.65); transition: transform .5s ease, filter .35s; }
.gallery-item:hover img { transform: scale(1.06); filter: saturate(.95) brightness(.75); }
.gallery-ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.gallery-ph svg { color: rgba(200,169,110,.1); }
.gallery-ph span { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,169,110,.18); }

/* ─── SOCIAL FOLLOW ──────────────────────── */
.social-follow { background: var(--bg-card); border-top: 1px solid rgba(200,169,110,.07); padding: 80px var(--gutter); text-align: center; }
.social-follow-inner { max-width: 580px; margin: 0 auto; }
.social-hed { font-family: 'Fraunces', serif; font-size: clamp(28px, 3.5vw, 44px); font-weight: 400; font-style: italic; color: var(--cream); margin-bottom: 16px; line-height: 1.15; }
.social-sub { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 32px; }
.social-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }


/* ─── OFF-SEASON CARD ────────────────────── */
.event-offseason {
  background: var(--bg-card);
  border: 1px solid rgba(200,169,110,.1);
  padding: 80px var(--gutter);
  text-align: center;
}
.offseason-inner { max-width: 560px; margin: 0 auto; }
.offseason-icon { color: rgba(200,169,110,.2); margin-bottom: 24px; display: flex; justify-content: center; }
.offseason-hed {
  font-family: 'Fraunces', serif; font-size: clamp(20px, 2.5vw, 30px);
  font-weight: 400; font-style: italic; color: var(--cream);
  margin-bottom: 14px; line-height: 1.2;
}
.offseason-sub { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 32px; }
.newsletter-form {
  display: flex; gap: 0; max-width: 420px; margin: 0 auto 16px;
  border: 1px solid rgba(200,169,110,.25);
}
.newsletter-form input[type="email"] {
  flex: 1; background: var(--bg); border: none;
  color: var(--cream); padding: 13px 18px;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 300;
  outline: none;
}
.newsletter-form input[type="email"]::placeholder { color: rgba(200,185,164,.3); }
.newsletter-form input[type="email"]:focus { background: var(--bg-surf); }
.newsletter-form button {
  background: var(--gold); color: var(--bg); border: none;
  padding: 13px 24px; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; flex-shrink: 0; transition: background .2s;
}
.newsletter-form button:hover { background: var(--gold-h); }
.newsletter-success { display: none; font-size: 13px; color: var(--gold); padding: 12px 0; font-style: italic; }
.offseason-alt { font-size: 12px; color: rgba(200,185,164,.35); margin-top: 4px; }
.offseason-alt a { color: var(--gold); border-bottom: 1px solid rgba(200,169,110,.3); }

/* ─── FOOTER ──────────────────────────────── */

/* ─── FADE-UP ─────────────────────────────── */
.fu { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }
.fu.vis { opacity: 1; transform: none; }
.fu-d1 { transition-delay: .12s; }
.fu-d2 { transition-delay: .22s; }

/* ─── RESPONSIVE ──────────────────────────── */
@media (max-width: 960px) {
  :root { --gutter: 36px; }
  .event-card { grid-template-columns: 1fr; }
  .event-poster { min-height: 260px; }
  .expect-inner, .your-event-inner { grid-template-columns: 1fr; }
  .gallery-grid { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
    }

  .nav-logo img { width: 200px; height: auto; }
  .strip { grid-template-columns: repeat(2, 1fr) !important; }
  .cards-row { grid-template-columns: 1fr 1fr !important; }
  .reviews-grid { grid-template-columns: 1fr 1fr !important; }
  .upcoming-grid { grid-template-columns: 1fr 1fr !important; }
  .gallery-grid { grid-template-columns: 1fr 1fr !important; }
}


/* ─── Hamburger button ───────────────────── */
.nav-hamburger {
  display: none;
  flex-direction: column; justify-content: center; gap: 5px;
  width: 48px; height: 48px; padding: 12px;
  cursor: pointer; background: none; border: none;
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  z-index: 1001; -webkit-tap-highlight-color: transparent;
}
.nav-hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: rgba(243,229,210,.8);
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  transform-origin: center;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ─── Overlay ────────────────────────────── */
.nav-overlay {
  position: fixed; inset: 0; z-index: 998;
  background: #141210;
  display: flex; flex-direction: column;
  clip-path: inset(0 0 100% 0);
  transition: clip-path .5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-overlay.open {
  clip-path: inset(0 0 0% 0);
  pointer-events: all;
}

/* Overlay header */
.ov-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.ov-logo { height: 52px; width: auto; object-fit: contain; }
.ov-close {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: rgba(200,185,164,.5);
  -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-close:hover { color: var(--cream); }

/* Gold rule */
.ov-rule {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,169,110,.25), transparent);
  margin: 0 24px;
  flex-shrink: 0;
}

/* Nav links */
.ov-nav {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 12px 36px 24px;
}
.ov-link {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0;
  border-bottom: 1px solid rgba(200,169,110,.07);
  transition: color .2s, transform .25s;
  -webkit-tap-highlight-color: transparent;
}
.ov-link:last-child { border-bottom: none; }
.ov-link:hover, .ov-link:active { color: var(--cream); transform: translateX(10px); }

/* Sub-group */
.ov-subgroup { border-bottom: 1px solid rgba(200,169,110,.07); }
.ov-subgroup:last-child { border-bottom: none; }
.ov-trigger {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0 12px;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-trigger:hover, .ov-trigger:active { color: var(--cream); }
.ov-trigger-arrow {
  width: 16px; height: 16px; color: rgba(200,169,110,.35);
  transition: transform .3s, color .2s; flex-shrink: 0; margin-top: 4px;
}
.ov-subgroup.expanded .ov-trigger-arrow { transform: rotate(90deg); color: var(--gold); }
.ov-subgroup.expanded .ov-trigger { color: var(--cream); }

.ov-sublinks {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
  padding-left: 4px;
}
.ov-subgroup.expanded .ov-sublinks { max-height: 300px; }
.ov-sublink {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,185,164,.4);
  padding: 10px 0;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.ov-sublink:hover, .ov-sublink:active { color: var(--gold); }
.ov-sublink .ov-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .3; flex-shrink: 0; }

/* Stagger animation */
.ov-link, .ov-trigger {
  opacity: 0; transform: translateY(16px);
  transition: opacity .4s ease, transform .4s ease, color .2s;
}
.nav-overlay.open .ov-link,
.nav-overlay.open .ov-trigger { opacity: 1; transform: translateY(0); }
.nav-overlay.open .ov-nav > *:nth-child(1) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(1).ov-link { transition-delay: .12s; }
.nav-overlay.open .ov-nav > *:nth-child(2) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(2).ov-link { transition-delay: .19s; }
.nav-overlay.open .ov-nav > *:nth-child(3) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(3).ov-link { transition-delay: .26s; }
.nav-overlay.open .ov-nav > *:nth-child(4) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(4).ov-link { transition-delay: .33s; }
.nav-overlay.open .ov-nav > *:nth-child(5) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(5).ov-link { transition-delay: .40s; }
.nav-overlay.open .ov-nav > *:nth-child(6).ov-link { transition-delay: .47s; }

/* Overlay footer */
.ov-footer {
  padding: 20px 36px 40px;
  border-top: 1px solid rgba(200,169,110,.08);
  flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
}
.ov-footer-hours { font-size: 11px; color: rgba(200,185,164,.3); margin-bottom: 3px; }
.ov-footer-addr  { font-size: 11px; color: rgba(200,185,164,.2); }
.ov-footer-ig { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(200,169,110,.4); transition: color .2s; }
.ov-footer-ig:hover { color: var(--gold); }

/* ── CANONICAL FOOTER ────────────────────── */
.site-footer {
  background: #0e0c0a;
  border-top: 1px solid rgba(200,169,110,.12);
  padding: 0 0 0;
}

/* Map strip */
.footer-map {
  width: 100%; height: 220px; overflow: hidden; position: relative;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.footer-map iframe {
  width: 100%; height: 100%; border: none; display: block;
  filter: invert(90%) hue-rotate(180deg) saturate(.55) brightness(.8);
}
.footer-map-cta {
  position: absolute; bottom: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(20,18,16,.9); border: 1px solid rgba(200,169,110,.3);
  color: var(--gold); font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 14px;
  backdrop-filter: blur(8px); transition: background .2s;
  text-decoration: none;
}
.footer-map-cta:hover { background: rgba(200,169,110,.12); }
.footer-map-cta svg { flex-shrink: 0; }

/* Main footer body */
.footer-body {
  max-width: 1200px; margin: 0 auto;
  padding: 52px 72px 40px;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 48px;
  align-items: start;
}

/* Column 1 — brand */
.footer-brand {}
.footer-brand-logo { margin-bottom: 20px; }
.footer-brand-logo img { width: 160px; object-fit: contain; }
.footer-brand-tagline { font-size: 12px; line-height: 1.8; color: rgba(200,185,164,.35); margin-bottom: 20px; }
.footer-brand-contact { display: flex; flex-direction: column; gap: 6px; }
.footer-brand-contact a,
.footer-brand-contact span {
  font-size: 12px; color: rgba(200,185,164,.45);
  text-decoration: none; transition: color .2s; line-height: 1.5;
}
.footer-brand-contact a:hover { color: var(--gold); }

/* Columns 2–4 */
.footer-col {}
.footer-col-title {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px; display: block;
}
.footer-col-links { display: flex; flex-direction: column; gap: 10px; }
.footer-col-links a,
.footer-col-links span {
  font-size: 12px; color: rgba(200,185,164,.5);
  text-decoration: none; transition: color .2s; line-height: 1.4;
}
.footer-col-links a:hover { color: var(--cream); }
.footer-col-links .footer-divider {
  height: 1px; background: rgba(200,169,110,.07); margin: 4px 0;
}

/* Bottom bar */
.footer-bottom-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 20px 72px 28px;
  border-top: 1px solid rgba(200,169,110,.07);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
/* Mobile footer */
@media (max-width: 768px) {
  .footer-map { height: 180px; }
  .footer-body {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 40px 20px 32px;
  }
  .footer-brand { grid-column: 1 / -1; }
  .footer-bottom-bar { padding: 16px 20px 24px; flex-direction: column; gap: 6px; text-align: center; }
}
@media (max-width: 480px) {
  .footer-body { grid-template-columns: 1fr; }
}
