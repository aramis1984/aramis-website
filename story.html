<style>

/* ─── TOKENS ─────────────────────────────── */
:root {
  --bg:       #1a1814;
  --bg-card:  #232019;
  --bg-surf:  #2a2620;
  --gold:     #c8a96e;
  --gold-h:   #dcc48e;
  --cream:    #f3e5d2;
  --muted:    #c8b9a4;
  --olive:    #6b7a5a;
  --nav-h:    180px;
  --gutter:   72px;
  --max-w:    1200px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

/* ─── NAV ────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--nav-h);
  display: flex; align-items: center;
  padding: 0 40px;
  background: rgba(26,24,20,.85);
  transition: background .4s, border-color .4s;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(26,24,20,.97);
  border-bottom-color: rgba(200,169,110,.12);
  backdrop-filter: blur(12px);
}

/* Left / Logo / Right columns */
.nav-left  {
  display: flex; align-items: center; justify-content: flex-end;
  flex: 1; gap: 2px;
}
.nav-right {
  display: flex; align-items: center; justify-content: flex-start;
  flex: 1; gap: 2px;
}
.nav-logo  { padding: 0 28px; flex-shrink: 0; }
.nav-logo img { width: 340px; height: 104px; object-fit: contain; display: block; }

/* Base nav link */
.nav-lk {
  font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px;
  text-transform: uppercase; color: rgba(243,229,210,.65);
  padding: 10px 22px; transition: color .2s;
  white-space: nowrap; line-height: 1; cursor: pointer;
  position: relative;
}
.nav-lk:hover,
.nav-lk.active { color: var(--gold); }

/* ── Dropdown parent ── */
.nav-dd {
  position: relative;
  display: flex; align-items: center;
}

/* The "The Venue" trigger link */
.nav-dd-trigger {
  display: flex; align-items: center; gap: 5px;
}
.nav-dd-trigger .chevron {
  width: 10px; height: 10px;
  transition: transform .25s;
  opacity: .5;
  flex-shrink: 0;
}
.nav-dd:hover .chevron,
.nav-dd.open .chevron { transform: rotate(180deg); opacity: 1; }

/* Dropdown panel */
.nav-dd-panel {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 220px;
  background: rgba(22,20,17,.98);
  border: 1px solid rgba(200,169,110,.15);
  border-top: 2px solid var(--gold);
  backdrop-filter: blur(16px);
  padding: 8px 0;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  /* open fast, close slow — gives cursor time to travel */
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear .35s;
  pointer-events: none;
}
/* Invisible bridge fills the gap between trigger and panel */
.nav-dd-panel::before {
  content: '';
  position: absolute;
  bottom: 100%; left: 0; right: 0;
  height: 12px;
}
.nav-dd:hover .nav-dd-panel,
.nav-dd.open .nav-dd-panel {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition: opacity .18s ease, transform .18s ease, visibility 0s linear 0s;
  pointer-events: auto;
}

/* Dropdown items */
.nav-dd-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  font-size: 10px; font-weight: 500; letter-spacing: 1.8px;
  text-transform: uppercase; color: rgba(243,229,210,.6);
  transition: color .18s, background .18s;
  white-space: nowrap;
}
.nav-dd-item:hover { color: var(--gold); background: rgba(200,169,110,.05); }
.nav-dd-item .dd-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--gold); opacity: .4; flex-shrink: 0;
}
.nav-dd-divider {
  height: 1px; background: rgba(200,169,110,.08);
  margin: 6px 0;
}

/* ─── HERO ───────────────────────────────── */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  position: relative;
  padding: 0 var(--gutter);
  /* Layered background: noise texture feel via radial gradients */
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(200,169,110,.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%,  rgba(200,169,110,.05) 0%, transparent 60%),
    radial-gradient(ellipse 100% 80% at 20% 50%,  rgba(26,22,18,1) 0%, transparent 100%),
    var(--bg);
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg,   transparent, transparent 79px, rgba(200,169,110,.025) 80px),
    repeating-linear-gradient(90deg,  transparent, transparent 79px, rgba(200,169,110,.025) 80px);
  pointer-events: none;
}
.hero-inner {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  max-width: 880px;
}
.hero-eyebrow {
  font-size: 9px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 32px;
  display: flex; align-items: center; gap: 16px;
}
.hero-eyebrow::before,
.hero-eyebrow::after { content: ''; width: 32px; height: 1px; background: var(--gold); opacity: .5; }
.hero-hed {
  font-family: 'Fraunces', serif;
  font-size: clamp(40px, 6vw, 86px);
  font-weight: 400; font-style: italic;
  line-height: 1.1; color: var(--cream);
  margin-bottom: 32px;
  letter-spacing: -1px;
}
.hero-hed em { font-style: normal; color: var(--gold); }
.hero-rule { width: 1px; height: 64px; background: linear-gradient(to bottom, rgba(200,169,110,.5), transparent); margin: 0 auto 32px; }
.hero-sub {
  font-size: 12px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(200,185,164,.45);
}
.hero-scroll {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.hero-scroll span { font-size: 8px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(200,185,164,.35); }
.scroll-line { width: 1px; height: 44px; background: linear-gradient(to bottom, rgba(200,169,110,.4), transparent); }

/* ─── SHARED SECTION HELPERS ─────────────── */
.stag {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
}
.stag::before { content: ''; width: 28px; height: 1px; background: var(--gold); flex-shrink: 0; }

.sec-hed {
  font-family: 'Fraunces', serif;
  font-size: clamp(30px, 3.5vw, 52px);
  font-weight: 400; line-height: 1.13;
  color: var(--cream); margin-bottom: 24px;
}
.sec-body {
  font-size: 15px; line-height: 1.85;
  color: var(--muted); margin-bottom: 20px;
}
.sec-body:last-of-type { margin-bottom: 0; }

/* Full-width section wrapper */
.section {
  padding: 100px var(--gutter);
  max-width: var(--max-w);
  margin: 0 auto;
}
.section-full {
  padding: 100px var(--gutter);
  width: 100%;
}

/* Divider line */
.divider {
  width: 100%; height: 1px;
  background: rgba(200,169,110,.07);
}

/* ─── FOUNDING ────────────────────────────── */
.founding {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 580px;
  border-top: 1px solid rgba(200,169,110,.07);
}
.founding-image {
  position: relative; overflow: hidden;
  background: var(--bg-surf);
  /* Uses a cropped slice of the Epic canvas */
}
.founding-image img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: 8% 35%;
  filter: saturate(.75) brightness(.85);
  transition: transform 8s ease;
}
.founding-image:hover img { transform: scale(1.04); }
.founding-image::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0; width: 80px;
  background: linear-gradient(to right, transparent, var(--bg));
  pointer-events: none;
}
.founding-text {
  background: var(--bg);
  padding: 80px var(--gutter);
  display: flex; flex-direction: column; justify-content: center;
}
.founding-pull {
  font-family: 'Fraunces', serif;
  font-size: clamp(17px, 1.8vw, 23px);
  font-weight: 400; font-style: italic;
  color: var(--gold); line-height: 1.55;
  margin-bottom: 32px;
  padding-left: 22px;
  border-left: 2px solid rgba(200,169,110,.25);
}

/* ─── FAMILY ──────────────────────────────── */
.family {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  border-bottom: 1px solid rgba(200,169,110,.07);
}
.family-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
  padding: 100px var(--gutter);
  max-width: var(--max-w);
  margin: 0 auto;
}
.family-pull {
  font-family: 'Fraunces', serif;
  font-size: 15px; font-style: italic;
  color: rgba(200,185,164,.5); line-height: 1.7;
  margin-top: 28px;
}
/* Photo grid */
.family-photos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 260px 260px;
  gap: 10px;
}
.fph {
  background: var(--bg-surf);
  overflow: hidden;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.fph:first-child {
  grid-column: 1 / -1;
  grid-row: 1;
}
.fph-label {
  position: absolute; bottom: 14px; left: 16px;
  font-size: 8px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,169,110,.6);
}
.fph-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: rgba(200,169,110,.18);
}
.fph-placeholder svg { opacity: .5; }
.fph-placeholder span { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }

/* ─── VENUE ───────────────────────────────── */
.venue {
  background: var(--bg);
  border-top: 1px solid rgba(200,169,110,.07);
}
.venue-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
  padding: 100px var(--gutter);
  max-width: var(--max-w);
  margin: 0 auto;
}
.venue-year {
  font-family: 'Fraunces', serif;
  font-size: 120px; font-weight: 300;
  color: rgba(200,169,110,.07);
  line-height: 1; margin-bottom: -20px;
  letter-spacing: -4px;
}
.btn-ghost {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 13px 28px;
  background: rgba(26,24,20,.85); color: var(--muted);
  font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
  border: 1px solid rgba(200,169,110,.3); transition: all .25s;
  margin-top: 32px;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.venue-timeline {
  display: flex; flex-direction: column; gap: 0;
}
.vtl-item {
  display: flex; gap: 28px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(200,169,110,.07);
}
.vtl-item:first-child { padding-top: 0; }
.vtl-item:last-child { border-bottom: none; }
.vtl-year {
  font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400;
  color: var(--gold); flex-shrink: 0; width: 72px; line-height: 1.2;
}
.vtl-desc { font-size: 14px; line-height: 1.75; color: var(--muted); padding-top: 4px; }

/* ─── MEMORY LANE INTRO ───────────────────── */
.ml-intro {
  background: var(--bg-card);
  border-top: 1px solid rgba(200,169,110,.07);
  text-align: center;
  padding: 100px var(--gutter) 64px;
}
.ml-intro-inner { max-width: 680px; margin: 0 auto; }
.ml-intro .stag { justify-content: center; }
.ml-intro .stag::before { display: none; }

/* ─── CANVAS GALLERY ──────────────────────── */
.canvas-gallery { background: var(--bg-card); }

.canvas-block { position: relative; }
.canvas-block + .canvas-block { margin-top: 4px; }

.canvas-bar {
  padding: 20px var(--gutter);
  display: flex; align-items: center; gap: 20px;
  background: var(--bg-card);
}
.canvas-bar-title {
  font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); white-space: nowrap;
}
.canvas-bar-line { flex: 1; height: 1px; background: rgba(200,169,110,.1); }
.canvas-bar-hint { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,169,110,.3); white-space: nowrap; }

.canvas-wrap {
  overflow: hidden; position: relative; cursor: zoom-in;
}
.canvas-wrap img {
  width: 100%; display: block;
  transition: transform 6s ease;
  transform-origin: center center;
}
.canvas-wrap:hover img { transform: scale(1.03); }
.canvas-ov {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(
    to bottom,
    rgba(26,24,20,.3) 0%,
    transparent 15%,
    transparent 80%,
    rgba(26,24,20,.5) 100%
  );
}

/* ─── ZOOM MODAL ──────────────────────────── */
.zoom-modal {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(8,7,6,.95); backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  padding: 48px; cursor: zoom-out;
}
.zoom-modal.open { display: flex; }
.zoom-modal img {
  max-width: 100%; max-height: 90vh;
  object-fit: contain;
  box-shadow: 0 40px 120px rgba(0,0,0,.6);
}
.zoom-close {
  position: absolute; top: 24px; right: 32px;
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(200,169,110,.6);
  background: none; border: 1px solid rgba(200,169,110,.2);
  padding: 10px 18px; cursor: pointer; transition: all .2s;
}
.zoom-close:hover { color: var(--gold); border-color: var(--gold); }

/* ─── SHARE YOUR STORY ────────────────────── */
.share {
  background: var(--bg);
  border-top: 1px solid rgba(200,169,110,.07);
}
.share-inner {
  padding: 100px var(--gutter);
  max-width: var(--max-w);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}
.share-cta-block {
  background: var(--bg-card);
  border: 1px solid rgba(200,169,110,.1);
  padding: 52px;
  display: flex; flex-direction: column; gap: 28px;
}
.share-cta-hed {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 2.2vw, 32px);
  font-weight: 400; color: var(--cream); line-height: 1.2;
}
.share-cta-body {
  font-size: 14px; line-height: 1.75; color: var(--muted);
}
.share-cta-body a {
  color: var(--gold);
  border-bottom: 1px solid rgba(200,169,110,.25);
  transition: border-color .2s;
}
.share-cta-body a:hover { border-color: var(--gold); }
.share-italic {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 14px; color: rgba(200,185,164,.4); line-height: 1.6;
}
.share-actions { display: flex; flex-direction: column; gap: 10px; }
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 14px 32px;
  background: var(--gold); color: var(--bg);
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  transition: background .2s;
}
.btn-primary:hover { background: var(--gold-h); }

/* ─── FOOTER ──────────────────────────────── */

/* ─── FADE-UP ─────────────────────────────── */
.fu { opacity: 0; transform: translateY(30px); transition: opacity .75s ease, transform .75s ease; }
.fu.vis { opacity: 1; transform: none; }
.fu-d1 { transition-delay: .1s; }
.fu-d2 { transition-delay: .2s; }

/* ─── RESPONSIVE ──────────────────────────── */
@media (max-width: 960px) {
  :root { --gutter: 36px; }
  .founding, .family-inner, .venue-inner, .share-inner { grid-template-columns: 1fr; }
  .founding-image { min-height: 320px; }
  .founding-image::after { display: none; }
  .nav-left, .nav-right { display: none; }
  .nav-logo img { width: 260px; }
    }


  .nav-logo img { width: 200px; height: auto; }
  .strip { grid-template-columns: repeat(2, 1fr) !important; }
  .cards-row { grid-template-columns: 1fr 1fr !important; }
  .reviews-grid { grid-template-columns: 1fr 1fr !important; }
  .upcoming-grid { grid-template-columns: 1fr 1fr !important; }
  .gallery-grid { grid-template-columns: 1fr 1fr !important; }
}


/* ─── Hamburger button ───────────────────── */
.nav-hamburger {
  display: none;
  flex-direction: column; justify-content: center; gap: 5px;
  width: 48px; height: 48px; padding: 12px;
  cursor: pointer; background: none; border: none;
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  z-index: 1001; -webkit-tap-highlight-color: transparent;
}
.nav-hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: rgba(243,229,210,.8);
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  transform-origin: center;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ─── Overlay ────────────────────────────── */
.nav-overlay {
  position: fixed; inset: 0; z-index: 998;
  background: #141210;
  display: flex; flex-direction: column;
  clip-path: inset(0 0 100% 0);
  transition: clip-path .5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-overlay.open {
  clip-path: inset(0 0 0% 0);
  pointer-events: all;
}

/* Overlay header */
.ov-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.ov-logo { height: 52px; width: auto; object-fit: contain; }
.ov-close {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: rgba(200,185,164,.5);
  -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-close:hover { color: var(--cream); }

/* Gold rule */
.ov-rule {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,169,110,.25), transparent);
  margin: 0 24px;
  flex-shrink: 0;
}

/* Nav links */
.ov-nav {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 12px 36px 24px;
}
.ov-link {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0;
  border-bottom: 1px solid rgba(200,169,110,.07);
  transition: color .2s, transform .25s;
  -webkit-tap-highlight-color: transparent;
}
.ov-link:last-child { border-bottom: none; }
.ov-link:hover, .ov-link:active { color: var(--cream); transform: translateX(10px); }

/* Sub-group */
.ov-subgroup { border-bottom: 1px solid rgba(200,169,110,.07); }
.ov-subgroup:last-child { border-bottom: none; }
.ov-trigger {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 400; font-style: italic;
  color: rgba(243,229,210,.5);
  line-height: 1;
  padding: 16px 0 12px;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: color .2s;
}
.ov-trigger:hover, .ov-trigger:active { color: var(--cream); }
.ov-trigger-arrow {
  width: 16px; height: 16px; color: rgba(200,169,110,.35);
  transition: transform .3s, color .2s; flex-shrink: 0; margin-top: 4px;
}
.ov-subgroup.expanded .ov-trigger-arrow { transform: rotate(90deg); color: var(--gold); }
.ov-subgroup.expanded .ov-trigger { color: var(--cream); }

.ov-sublinks {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
  padding-left: 4px;
}
.ov-subgroup.expanded .ov-sublinks { max-height: 300px; }
.ov-sublink {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,185,164,.4);
  padding: 10px 0;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.ov-sublink:hover, .ov-sublink:active { color: var(--gold); }
.ov-sublink .ov-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .3; flex-shrink: 0; }

/* Stagger animation */
.ov-link, .ov-trigger {
  opacity: 0; transform: translateY(16px);
  transition: opacity .4s ease, transform .4s ease, color .2s;
}
.nav-overlay.open .ov-link,
.nav-overlay.open .ov-trigger { opacity: 1; transform: translateY(0); }
.nav-overlay.open .ov-nav > *:nth-child(1) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(1).ov-link { transition-delay: .12s; }
.nav-overlay.open .ov-nav > *:nth-child(2) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(2).ov-link { transition-delay: .19s; }
.nav-overlay.open .ov-nav > *:nth-child(3) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(3).ov-link { transition-delay: .26s; }
.nav-overlay.open .ov-nav > *:nth-child(4) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(4).ov-link { transition-delay: .33s; }
.nav-overlay.open .ov-nav > *:nth-child(5) .ov-trigger,
.nav-overlay.open .ov-nav > *:nth-child(5).ov-link { transition-delay: .40s; }
.nav-overlay.open .ov-nav > *:nth-child(6).ov-link { transition-delay: .47s; }

/* Overlay footer */
.ov-footer {
  padding: 20px 36px 40px;
  border-top: 1px solid rgba(200,169,110,.08);
  flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
}
.ov-footer-hours { font-size: 11px; color: rgba(200,185,164,.3); margin-bottom: 3px; }
.ov-footer-addr  { font-size: 11px; color: rgba(200,185,164,.2); }
.ov-footer-ig { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(200,169,110,.4); transition: color .2s; }
.ov-footer-ig:hover { color: var(--gold); }

/* ── CANONICAL FOOTER ────────────────────── */
.site-footer {
  background: #0e0c0a;
  border-top: 1px solid rgba(200,169,110,.12);
  padding: 0 0 0;
}

/* Map strip */
.footer-map {
  width: 100%; height: 220px; overflow: hidden; position: relative;
  border-bottom: 1px solid rgba(200,169,110,.1);
}
.footer-map iframe {
  width: 100%; height: 100%; border: none; display: block;
  filter: invert(90%) hue-rotate(180deg) saturate(.55) brightness(.8);
}
.footer-map-cta {
  position: absolute; bottom: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(20,18,16,.9); border: 1px solid rgba(200,169,110,.3);
  color: var(--gold); font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 14px;
  backdrop-filter: blur(8px); transition: background .2s;
  text-decoration: none;
}
.footer-map-cta:hover { background: rgba(200,169,110,.12); }
.footer-map-cta svg { flex-shrink: 0; }

/* Main footer body */
.footer-body {
  max-width: 1200px; margin: 0 auto;
  padding: 52px 72px 40px;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 48px;
  align-items: start;
}

/* Column 1 — brand */
.footer-brand {}
.footer-brand-logo { margin-bottom: 20px; }
.footer-brand-logo img { width: 160px; object-fit: contain; }
.footer-brand-tagline { font-size: 12px; line-height: 1.8; color: rgba(200,185,164,.35); margin-bottom: 20px; }
.footer-brand-contact { display: flex; flex-direction: column; gap: 6px; }
.footer-brand-contact a,
.footer-brand-contact span {
  font-size: 12px; color: rgba(200,185,164,.45);
  text-decoration: none; transition: color .2s; line-height: 1.5;
}
.footer-brand-contact a:hover { color: var(--gold); }

/* Columns 2–4 */
.footer-col {}
.footer-col-title {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px; display: block;
}
.footer-col-links { display: flex; flex-direction: column; gap: 10px; }
.footer-col-links a,
.footer-col-links span {
  font-size: 12px; color: rgba(200,185,164,.5);
  text-decoration: none; transition: color .2s; line-height: 1.4;
}
.footer-col-links a:hover { color: var(--cream); }
.footer-col-links .footer-divider {
  height: 1px; background: rgba(200,169,110,.07); margin: 4px 0;
}

/* Bottom bar */
.footer-bottom-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 20px 72px 28px;
  border-top: 1px solid rgba(200,169,110,.07);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
/* Mobile footer */
@media (max-width: 768px) {
  .footer-map { height: 180px; }
  .footer-body {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 40px 20px 32px;
  }
  .footer-brand { grid-column: 1 / -1; }
  .footer-bottom-bar { padding: 16px 20px 24px; flex-direction: column; gap: 6px; text-align: center; }
}
@media (max-width: 480px) {
  .footer-body { grid-template-columns: 1fr; }
}
